<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique+Soft&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;touch-action:manipulation;}
#gc{background:linear-gradient(180deg,#87CEEB 0%,#c5e8f7 70%,#e8f4fd 100%);width:100vw;height:100dvh;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.screen{display:none;flex:1;overflow:hidden;}.screen.active{display:flex;flex-direction:column;}

/* SETUP */
#ss{flex-direction:column;align-items:center;justify-content:space-evenly;background:linear-gradient(180deg,#0d4a82 0%,#1a6fb5 50%,#4a9fd4 100%);padding:clamp(16px,4vh,32px) 20px;text-align:center;overflow-y:auto;}
#ss.active{display:flex;}
.gtitle{font-family:'Zen Antique Soft',serif;font-size:clamp(38px,9vw,52px);font-weight:900;color:#FFE566;text-shadow:3px 3px 0 #5a2d00,-1px -1px 0 #5a2d00;letter-spacing:4px;margin-bottom:4px;line-height:1.1;}
.gsubt{color:rgba(255,255,255,.7);font-size:clamp(13px,3.5vw,16px);letter-spacing:2px;margin-bottom:0;}
.sbox{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:clamp(18px,4vw,26px) clamp(16px,5vw,28px);width:100%;max-width:480px;margin-bottom:0;}
.sbox-title{color:#FFE566;font-size:clamp(13px,3.5vw,15px);letter-spacing:1px;margin-bottom:16px;font-weight:700;}
.btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.sel-btn{width:clamp(64px,16vw,76px);height:clamp(64px,16vw,76px);border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:clamp(22px,6vw,28px);font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;-webkit-tap-highlight-color:transparent;}
.sel-btn.chosen{background:#fff!important;color:#0d4a82!important;border-color:#fff!important;box-shadow:0 0 0 4px rgba(255,255,255,.35)!important;font-weight:900;}
.start-btn{border:none;padding:clamp(16px,4vw,20px) clamp(40px,12vw,60px);font-size:clamp(17px,4.5vw,21px);font-weight:700;border-radius:50px;cursor:not-allowed;font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;transition:all .2s;background:rgba(255,255,255,.15);color:rgba(255,255,255,.35);width:100%;max-width:340px;-webkit-tap-highlight-color:transparent;}
.start-btn.ready{background:#fff!important;color:#0d4a82!important;box-shadow:0 6px 24px rgba(0,0,0,.35)!important;cursor:pointer;}
.note{color:rgba(255,255,255,.65);font-size:clamp(11px,3vw,13px);margin-bottom:0;min-height:18px;}

/* PLAYER BAR */
.pbar{display:flex;gap:5px;padding:8px 12px;background:#111;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.pbar-title{font-family:'Zen Antique Soft',serif;font-size:13px;color:#fff;letter-spacing:2px;margin-right:6px;}
.pchip{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:50px;padding:5px 12px;border:1px solid rgba(255,255,255,.3);font-size:12px;color:#ddd;}
.pchip.active{background:#FFE566;color:#111;border-color:#FFE566;font-weight:700;}
.cpu-tag{font-size:10px;background:rgba(255,255,255,.3);border-radius:3px;padding:0 3px;margin-left:2px;}
.pchip.active .cpu-tag{background:rgba(0,0,0,.2);}

/* GAME SCREEN - 縦積みレイアウト */
#gs.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.game-body{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:8px;padding:8px 10px;-webkit-overflow-scrolling:touch;}

/* 上段: 屋上中央寄せ */
.top-row{display:flex;justify-content:center;}

/* ROOFTOP */
.roof-wrap{display:flex;flex-direction:column;align-items:center;width:100%;}
.compass-label{text-align:center;font-size:12px;font-weight:700;color:#4a6fa5;}
.compass-side{display:flex;align-items:center;gap:4px;}
.compass-lr{font-size:12px;font-weight:700;color:#4a6fa5;writing-mode:vertical-rl;}
#rgrid{display:grid;position:relative;gap:3px;}
.rcell{width:clamp(42px,11vw,52px);height:clamp(42px,11vw,52px);border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .3s;background:linear-gradient(135deg,#d4e8f0,#c2dae8);border:2px solid #9bbdd4;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(0,0,50,.12);}
.rcell::after{content:'';position:absolute;inset:0;border-radius:6px;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 60%);pointer-events:none;}
.rcell.safe{background:linear-gradient(135deg,#a8edbc,#6dcc88);border-color:#3da85a;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 0 0 2px rgba(61,168,90,.3),0 2px 6px rgba(0,80,0,.2);}
.rcell.edge{background:linear-gradient(135deg,#f5c0b0,#e8a090);border-color:#c0604a;}
.rcell.has-pawn{background:linear-gradient(135deg,#fff3c4,#ffe080);border-color:#d4a800;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 0 0 2px rgba(212,168,0,.4);}
.rcell.empty-cell{background:transparent;border:none;box-shadow:none;}
.rcell.empty-cell::after{display:none;}
.rcell:not(.safe):not(.edge):not(.has-pawn):not(.empty-cell)::before{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35);top:4px;left:4px;pointer-events:none;}
.safe-text{font-size:8px;font-weight:800;color:#1a6b35;}
.pawn-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;}
.roof-legend{display:flex;gap:8px;margin-top:6px;font-size:11px;align-items:center;flex-wrap:wrap;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:4px;}
.leg-box{width:13px;height:13px;border-radius:3px;flex-shrink:0;}

/* 確保対象帯 */
.chara-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#FFE566;border-top:2px solid #111;border-bottom:2px solid #111;flex-shrink:0;font-size:12px;color:#111;}
.chara-bar b{font-size:13px;color:#111;}

/* サイコロアニメ（ポップアップ内で使用） */
@keyframes droll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(15deg) scale(1.1)}50%{transform:rotate(-10deg) scale(.95)}75%{transform:rotate(8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
.dice-anim{animation:droll .5s ease;}

/* 4択サイコロポップアップ用スタイル */
.roll-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.roll-choice-btn{
  border:2px solid transparent;border-radius:16px;padding:clamp(14px,4vw,18px) 8px;
  font-family:'Noto Sans JP',sans-serif;font-size:clamp(14px,3.8vw,16px);font-weight:700;
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;
  align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;min-height:90px;
  justify-content:center;
}
.roll-choice-btn:active{transform:scale(.94);}
.rc-normal{background:#e8f0fe;border-color:#4a7fd4;color:#1a3a82;}
.rc-strong{background:#fff0e0;border-color:#e07820;color:#7a3a00;}
.rc-weak{background:#e8f8ee;border-color:#3da85a;color:#1a5a2a;}
.rc-cancel{background:#f5f5f5;border-color:#bbb;color:#666;}
.rc-label{font-size:clamp(13px,3.5vw,15px);font-weight:700;}
.rc-desc{font-size:clamp(10px,2.8vw,12px);font-weight:400;opacity:.8;line-height:1.4;text-align:center;}
.rc-dice-preview{font-size:clamp(22px,6vw,28px);line-height:1;}

/* ===== 縦長呼びかけカード ===== */
.cards-section-label{font-size:12px;color:#0d4a82;font-weight:700;margin-bottom:6px;letter-spacing:.5px;}
.cards-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

/* 縦長カード本体 */
.vcard{
  background:#fff;
  border:2px solid #4a9fd4;
  border-radius:12px;
  cursor:pointer;
  transition:all .18s;
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
.vcard:active:not(.used){border-color:#FFE566;transform:scale(0.97);box-shadow:0 3px 12px rgba(0,0,0,.18);}
.vcard.sel{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.45);}
.vcard.used{opacity:.26;cursor:not-allowed;filter:grayscale(1);}
.sel-badge{position:absolute;top:3px;right:3px;background:#e8b84b;color:#5a3000;font-size:8px;font-weight:700;border-radius:4px;padding:2px 5px;z-index:2;}

/* カード上部: 絵文字 + セリフ */
.card-header{
  display:flex;align-items:center;gap:5px;
  padding:8px 8px 6px;
  border-bottom:1px solid rgba(0,0,0,.08);
}
.card-emoji-lg{font-size:20px;line-height:1;flex-shrink:0;}
.card-serif-v{font-size:clamp(11px,3vw,13px);font-weight:700;color:#c0392b;line-height:1.4;flex:1;}

/* コンパスグリッド */
.card-compass{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto auto auto;
  gap:3px;
  padding:6px;
  background:#f0f4ff;
  flex:1;
}
.cc{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:6px;
  padding:5px 2px;
  min-height:38px;
}
.cc.cN{background:#dbeafe;grid-column:2;grid-row:1;}
.cc.cW{background:#fce7f3;grid-column:1;grid-row:2;}
.cc.cE{background:#fef3c7;grid-column:3;grid-row:2;}
.cc.cS{background:#d1fae5;grid-column:2;grid-row:3;}
.cc.ce{background:transparent;}
.cc-dir{font-size:14px;font-weight:900;line-height:1;margin-bottom:3px;}
.cN .cc-dir{color:#1e40af;}
.cE .cc-dir{color:#92400e;}
.cS .cc-dir{color:#065f46;}
.cW .cc-dir{color:#831843;}
.cc-dice{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.pip-sm{width:14px;height:14px;flex-shrink:0;}

/* LOG */
.glog{font-size:11px;color:#333;line-height:1.6;max-height:52px;overflow-y:auto;}
.log-e{padding:1px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.log-e.last{font-weight:700;color:#0d4a82;}

/* RESULT */
#rs{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(20px,6vw,40px) clamp(16px,6vw,32px);overflow-y:auto;}
#rs.active{display:flex;}
.r-win{background:linear-gradient(180deg,#0d6b2e,#27ae60);}
.r-lose{background:linear-gradient(180deg,#4a0a0a,#c0392b);}
.rtitle{font-family:'Zen Antique Soft',serif;font-size:clamp(38px,10vw,56px);font-weight:900;margin-bottom:12px;text-shadow:3px 3px 0 rgba(0,0,0,.3);animation:rpop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes rpop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.rsub{font-size:clamp(14px,3.8vw,17px);color:rgba(255,255,255,.9);margin-bottom:22px;line-height:1.7;}
.rdetail{background:rgba(255,255,255,.15);border-radius:16px;padding:16px 22px;margin-bottom:24px;font-size:clamp(13px,3.5vw,15px);color:rgba(255,255,255,.9);line-height:2;}
.retry-btn{background:white;border:none;padding:clamp(16px,4.5vw,20px) clamp(40px,12vw,64px);font-size:clamp(17px,4.5vw,20px);font-weight:700;border-radius:50px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);-webkit-tap-highlight-color:transparent;}
.result-chara{margin-bottom:10px;animation:rpop .6s cubic-bezier(.34,1.56,.64,1) .1s both;}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.15);display:flex;align-items:flex-end;justify-content:center;z-index:999;pointer-events:none;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup-box{background:white;border-radius:24px 24px 0 0;padding:clamp(20px,5vw,28px) clamp(18px,5vw,24px) clamp(28px,8vw,40px);max-width:520px;width:100%;box-shadow:0 -4px 32px rgba(0,0,0,.22);text-align:center;animation:slideUp .25s cubic-bezier(.34,1.2,.64,1);pointer-events:auto;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.popup-icon{font-size:clamp(40px,10vw,52px);margin-bottom:10px;line-height:1;}
.popup-title{font-size:clamp(15px,4vw,17px);font-weight:700;color:#0d4a82;margin-bottom:10px;line-height:1.5;}
.popup-body{font-size:clamp(13px,3.5vw,15px);color:#333;line-height:1.7;margin-bottom:14px;}
.popup-body b{color:#c0392b;}
.popup-btns{display:flex;gap:12px;justify-content:center;}
.popup-btn{padding:clamp(13px,3.5vw,16px) clamp(24px,7vw,32px);border:none;border-radius:50px;font-size:clamp(15px,4vw,17px);font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.popup-btn.yes{background:#0d4a82;color:white;}
.popup-btn.no{background:#f0f0f0;color:#555;}
.popup-btn.only{background:#0d4a82;color:white;padding:clamp(13px,3.5vw,16px) clamp(40px,12vw,56px);}

/* ポップアップ内縦長カード */
.popup-vcard{
  display:inline-flex;flex-direction:column;
  border:2px solid #e8b84b;border-radius:10px;
  overflow:hidden;margin:4px auto 10px;
  width:140px;text-align:left;
  background:#fff;
}
.pvc-header{display:flex;align-items:center;gap:5px;padding:6px 8px 5px;border-bottom:1px solid rgba(232,184,75,.3);}
.pvc-emoji{font-size:22px;flex-shrink:0;}
.pvc-serif{font-size:9px;font-weight:700;color:#c0392b;line-height:1.3;flex:1;}
.pvc-compass{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:2px;padding:5px;background:#f0f4ff;}
.pvcc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:30px;border-radius:4px;padding:2px 1px;}
.pvcc.pvN{background:#dbeafe;grid-column:2;grid-row:1;}
.pvcc.pvW{background:#fce7f3;grid-column:1;grid-row:2;}
.pvcc.pvE{background:#fef3c7;grid-column:3;grid-row:2;}
.pvcc.pvS{background:#d1fae5;grid-column:2;grid-row:3;}
.pvcc.pve{background:transparent;}
.pvcc-dir{font-size:10px;font-weight:900;line-height:1;margin-bottom:2px;}
.pvN .pvcc-dir{color:#1e40af;}.pvE .pvcc-dir{color:#92400e;}.pvS .pvcc-dir{color:#065f46;}.pvW .pvcc-dir{color:#831843;}
.pvcc-dice{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;}
.pp-sm{width:10px;height:10px;flex-shrink:0;}
</style>

<div id="gc">
<!-- SETUP -->
<div id="ss" class="screen active">
  <div class="gtitle">そこを動くな！</div>
  <div class="gsubt">協力型 救出ゲーム</div>
  <div class="sbox">
    <div class="sbox-title">🤖 CPUプレイヤー数を選んでください</div>
    <div class="btn-row" id="crow">
      <button class="sel-btn" onclick="setCpu(0)">0</button><button class="sel-btn" onclick="setCpu(1)">1</button><button class="sel-btn" onclick="setCpu(2)">2</button>
    </div>
  </div>
  <button class="start-btn" id="start-btn">ゲームを始める</button>
  <div style="color:rgba(255,255,255,.4);font-size:clamp(11px,3vw,13px);text-align:center;">プレイ人数 1名（CPU 0〜2名）<br>プレイ時間 1〜15分</div>
</div>

<!-- GAME -->
<div id="gs" class="screen">
  <div class="pbar" id="pbar"><span class="pbar-title">参加者</span></div>
  <div class="chara-bar" id="chara-bar"></div>
  <div class="game-body">
    <!-- 上段: 屋上のみ -->
    <div class="top-row">
      <div class="roof-wrap">
        <div class="compass-label" style="margin-bottom:2px;">北</div>
        <div class="compass-side">
          <div class="compass-lr">西</div>
          <div id="rgrid"></div>
          <div class="compass-lr">東</div>
        </div>
        <div class="compass-label" style="margin-top:2px;">南</div>
        <div class="roof-legend">
          <div class="leg-item"><div class="leg-box" style="background:linear-gradient(135deg,#a8edbc,#6dcc88);border:1.5px solid #3da85a;"></div><span style="color:#1a6b35;font-weight:700;">安全圏</span></div>
          <div class="leg-item"><div class="leg-box" style="background:linear-gradient(135deg,#f5c0b0,#e8a090);border:1.5px solid #c0604a;"></div><span style="color:#7a3020;">端</span></div>
        </div>
      </div>
    </div>

    <!-- カード一覧 -->
    <div>
      <div class="cards-section-label">🗣️ 呼びかけカード（<span id="ccount">0</span>枚残り）</div>
      <div class="cards-col" id="cgrid"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="rs" class="screen">
  <div class="result-chara" id="result-chara"></div>
  <div class="rtitle" id="rtitle"></div>
  <div class="rsub" id="rsub"></div>
  <div class="rdetail" id="rdetail"></div>
  <button class="retry-btn" onclick="showSetup()">もう一度遊ぶ</button>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup" style="display:none;">
  <div class="popup-box">
    <div class="popup-icon" id="popup-icon"></div>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-body" id="popup-body"></div>
    <div class="popup-btns" id="popup-btns"></div>
  </div>
</div>
</div>

<script>
const ROOFTOPS=[
  {name:"標準屋上",cols:3,rows:5,safe:[{r:4,c:1}],start:{r:0,c:1}},
  {name:"L字屋上",cols:3,rows:4,cells:[[0,1],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2],[3,1]],safe:[{r:3,c:1}],start:{r:0,c:1}},
  {name:"T字屋上",cols:3,rows:5,cells:[[0,1],[1,0],[1,1],[1,2],[2,1],[3,1],[4,1]],safe:[{r:4,c:1}],start:{r:0,c:1}},
  {name:"広い屋上",cols:4,rows:4,safe:[{r:3,c:1},{r:3,c:2}],start:{r:0,c:1}},
  {name:"細長い屋上",cols:2,rows:6,safe:[{r:5,c:0},{r:5,c:1}],start:{r:0,c:0}},
  {name:"コの字屋上",cols:3,rows:4,cells:[[0,0],[0,1],[0,2],[1,0],[1,2],[2,0],[2,2],[3,0],[3,1],[3,2]],safe:[{r:3,c:1}],start:{r:0,c:1}},
  {name:"正方形屋上",cols:4,rows:4,safe:[{r:3,c:1},{r:3,c:2}],start:{r:0,c:1}},
  {name:"細道屋上",cols:1,rows:7,safe:[{r:6,c:0}],start:{r:0,c:0}},
  {name:"広場屋上",cols:5,rows:5,safe:[{r:4,c:2}],start:{r:0,c:2}},
  {name:"斜め屋上",cols:3,rows:5,cells:[[0,2],[1,1],[1,2],[2,0],[2,1],[3,0],[4,0]],safe:[{r:4,c:0}],start:{r:0,c:2}}
];
const CARDS=[
  {serif:"こっちに来い！",emoji:"👮",bg:"#e3f2fd",dirs:{1:"N",2:"E",3:"N",4:"W",5:"S",6:"E"}},
  {serif:"落ち着いて！",emoji:"🙏",bg:"#f3e5f5",dirs:{1:"S",2:"S",3:"N",4:"E",5:"W",6:"N"}},
  {serif:"話を聞かせてくれ！",emoji:"👂",bg:"#fff3e0",dirs:{1:"E",2:"N",3:"W",4:"S",5:"N",6:"S"}},
  {serif:"家族が待ってるぞ！",emoji:"👨‍👩‍👧",bg:"#e8f5e9",dirs:{1:"W",2:"S",3:"E",4:"N",5:"S",6:"W"}},
  {serif:"君の話を聞きたい！",emoji:"💬",bg:"#fce4ec",dirs:{1:"N",2:"W",3:"S",4:"N",5:"E",6:"N"}},

/* ===== サイコロSVG ===== */
function makeDiceSvg(face,size){
  const pips=[[],[{x:5,y:5}],[{x:2.5,y:2.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:5,y:5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:5},{x:7.5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}]];
  const ps=pips[face].map(p=>`<circle cx="${p.x}" cy="${p.y}" r="1.1" fill="#1a1a2e"/>`).join('');
  return `<svg viewBox="0 0 10 10" width="${size}" height="${size}"><rect width="10" height="10" rx="1.5" fill="white" stroke="#bbb" stroke-width=".5"/>${ps}</svg>`;
}

/* ===== 縦長カードHTML（ゲーム画面用） ===== */
function makeVCard(card, idx){
  const isSelected=G.selCard===idx, isUsed=card.used;
  const byDir={N:[],E:[],S:[],W:[]};
  for(let d=1;d<=6;d++) byDir[card.dirs[d]].push(d);

  function ccCell(dir,col,row){
    const faces=byDir[dir];
    const label={N:'北',E:'東',S:'南',W:'西'}[dir];
    if(!faces.length) return `<div class="cc ce" style="grid-column:${col};grid-row:${row};"></div>`;
    const dice=faces.map(f=>makeDiceSvg(f,11)).join('');
    return `<div class="cc c${dir}" style="grid-column:${col};grid-row:${row};">
      <div class="cc-dir">${label}</div>
      <div class="cc-dice">${dice}</div>
    </div>`;
  }

  const el=document.createElement('div');
  el.className='vcard'+(isUsed?' used':'')+(isSelected?' sel':'');
  el.innerHTML=`${isSelected?'<div class="sel-badge">選択中</div>':''}
    <div class="card-header" style="background:${card.bg};">
      <span class="card-emoji-lg">${card.emoji}</span>
      <span class="card-serif-v">「${card.serif}」</span>
    </div>
    <div class="card-compass">
      <div class="cc ce" style="grid-column:1;grid-row:1;"></div>${ccCell('N',2,1)}<div class="cc ce" style="grid-column:3;grid-row:1;"></div>
      ${ccCell('W',1,2)}<div class="cc ce" style="grid-column:2;grid-row:2;"></div>${ccCell('E',3,2)}
      <div class="cc ce" style="grid-column:1;grid-row:3;"></div>${ccCell('S',2,3)}<div class="cc ce" style="grid-column:3;grid-row:3;"></div>
    </div>`;
  if(!isUsed&&(G.phase==='select'||G.phase==='roll')) el.onclick=()=>selectCard(idx);
  return el;
}

/* ===== 効果音エンジン (Web Audio API) ===== */
const SFX = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function osc(freq, type, start, dur, vol, ac) {
    const g = ac.createGain();
    g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    const o = ac.createOscillator();
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime + start);
    o.connect(g); o.start(ac.currentTime + start); o.stop(ac.currentTime + start + dur);
  }
  function sweep(f0, f1, type, start, dur, vol, ac) {
    const g = ac.createGain();
    g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    const o = ac.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(f0, ac.currentTime + start);
    o.frequency.linearRampToValueAtTime(f1, ac.currentTime + start + dur);
    o.connect(g); o.start(ac.currentTime + start); o.stop(ac.currentTime + start + dur);
  }
  function noise(start, dur, vol, ac) {
    const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    src.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime + start); src.stop(ac.currentTime + start + dur);
  }
  return {
    cardSelect()  { const ac=getCtx(); osc(600,'sine',0,.06,.18,ac); osc(900,'sine',.04,.06,.1,ac); },
    diceRattle()  { const ac=getCtx(); noise(0,.05,.25,ac); noise(.07,.05,.2,ac); noise(.14,.04,.15,ac); },
    diceResult()  { const ac=getCtx(); noise(0,.08,.35,ac); osc(120,'sine',0,.25,.5,ac); osc(60,'sine',.06,.3,.3,ac); },
    charaMove()   { const ac=getCtx(); sweep(300,80,'sine',0,.35,.4,ac); noise(0,.1,.15,ac); },
    gameStart()   { const ac=getCtx(); [0,.18,.36].forEach((t,i)=>osc([440,440,660][i],'square',t,.14,.12,ac)); },
    turnStart()   { const ac=getCtx(); osc(880,'sine',0,.08,.15,ac); osc(660,'sine',.09,.08,.1,ac); },
    win() {
      // ギャラリーの大歓声：ノイズ+歓声っぽい複数音の重なり
      const ac = getCtx();
      // どよめき感：帯域ノイズを複数重ねてフェードイン→サステイン
      [0, 0.05, 0.1, 0.18, 0.28].forEach((t, i) => {
        const vol = [0.18, 0.22, 0.28, 0.32, 0.35][i];
        const dur = [1.2, 1.1, 1.0, 0.9, 1.3][i];
        const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
        const src = ac.createBufferSource(); src.buffer = buf;
        // バンドパスフィルタで「声」帯域に絞る
        const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
        bp.frequency.value = [800,1200,600,1000,900][i]; bp.Q.value = 0.6;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.001, ac.currentTime + t);
        g.gain.linearRampToValueAtTime(vol, ac.currentTime + t + 0.15);
        g.gain.setValueAtTime(vol, ac.currentTime + t + dur - 0.3);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + dur);
        src.connect(bp); bp.connect(g); g.connect(ac.destination);
        src.start(ac.currentTime + t); src.stop(ac.currentTime + t + dur);
      });
      // 歓声のピークで高揚感ある口笛・歓声トーン
      [[1200,0.2],[1500,0.35],[900,0.5],[1800,0.6]].forEach(([f,t]) => {
        const g = ac.createGain();
        g.gain.setValueAtTime(0.08, ac.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.4);
        const o = ac.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(f, ac.currentTime + t);
        o.frequency.linearRampToValueAtTime(f * 1.15, ac.currentTime + t + 0.2);
        o.connect(g); g.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.4);
      });
    },
    lose() {
      // パトカーのサイレンが遠ざかる音
      const ac = getCtx();
      const totalDur = 3.0;
      // ウーウー繰り返しサイレン（ピッチと音量が徐々に下がる）
      for (let i = 0; i < 6; i++) {
        const t = i * 0.48;
        const distanceFade = Math.pow(0.55, i); // 遠ざかるにつれ減衰
        const pitchFade = 1 - i * 0.05;         // ドップラー効果で音が低くなる
        // 高音
        const g1 = ac.createGain();
        g1.gain.setValueAtTime(0.28 * distanceFade, ac.currentTime + t);
        g1.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.22);
        const o1 = ac.createOscillator(); o1.type = 'sawtooth';
        o1.frequency.setValueAtTime(880 * pitchFade, ac.currentTime + t);
        o1.frequency.linearRampToValueAtTime(660 * pitchFade, ac.currentTime + t + 0.22);
        o1.connect(g1); g1.connect(ac.destination);
        o1.start(ac.currentTime + t); o1.stop(ac.currentTime + t + 0.22);
        // 低音（位相ずらし）
        const g2 = ac.createGain();
        g2.gain.setValueAtTime(0.22 * distanceFade, ac.currentTime + t + 0.22);
        g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.44);
        const o2 = ac.createOscillator(); o2.type = 'sawtooth';
        o2.frequency.setValueAtTime(660 * pitchFade, ac.currentTime + t + 0.22);
        o2.frequency.linearRampToValueAtTime(880 * pitchFade, ac.currentTime + t + 0.44);
        o2.connect(g2); g2.connect(ac.destination);
        o2.start(ac.currentTime + t + 0.22); o2.stop(ac.currentTime + t + 0.44);
      }
    },
    confirm()     { const ac=getCtx(); osc(440,'sine',0,.07,.12,ac); },
    // 女性の悲鳴：高音域の鋭いグリッサンド＋振動
    screamFemale() {
      const ac=getCtx();
      // 鋭い高音の立ち上がり
      sweep(900,1800,'sine',0,.18,.28,ac);
      sweep(800,1600,'sine',.02,.2,.2,ac);
      // 悲鳴の震え（ビブラート風）
      [.18,.24,.30,.36,.42].forEach((t,i)=>{
        const vol=.22-i*.04;
        sweep(1600-i*60,1400-i*60,'sine',t,.1,vol,ac);
      });
      // フェードアウト
      sweep(1300,600,'sine',.45,.35,.12,ac);
    },
    // 男性の悲鳴：低めの荒々しい叫び
    screamMale() {
      const ac=getCtx();
      // 低音域の荒い叫び
      sweep(300,600,'sawtooth',0,.15,.3,ac);
      sweep(250,500,'sawtooth',.02,.18,.22,ac);
      // 叫びの粗さ（ノイズ混じり）
      noise(0,.2,.2,ac);
      // 震え
      [.15,.22,.29,.36].forEach((t,i)=>{
        const vol=.25-i*.05;
        sweep(520-i*30,420-i*30,'sawtooth',t,.12,vol,ac);
      });
      // フェードアウト
      sweep(400,150,'sawtooth',.4,.4,.12,ac);
    },
  };
})();

function cpuPickCard(){
  const p=G.players[G.cur];const avail=p.cards.map((c,i)=>({c,i})).filter(({c})=>!c.used);if(!avail.length)return -1;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
  const bd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(G.pawn.r,G.pawn.c,s.r,s.c)),999);
  let best=null,bs=-999;
  avail.forEach(({c:card,i})=>{let score=0;for(let d=1;d<=6;d++){const [dr,dc]=dm[card.dirs[d]];const nr=G.pawn.r+dr,nc=G.pawn.c+dc;if(!onBoard(nr,nc)){score-=3;}else if(isSafe(nr,nc)){score+=6;}else{const nd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(nr,nc,s.r,s.c)),999);score+=nd<bd?1:nd>bd?-1:0;}}if(score>bs){bs=score;best=i;}});
  return best!==null?best:avail[0].i;
}


function showSetup(){G.pc=1;G.cpuCount=-1;document.querySelectorAll('#crow .sel-btn').forEach(b=>b.setAttribute('class','sel-btn'));const btn=document.getElementById('start-btn');btn.setAttribute('class','start-btn');btn.onclick=null;showScreen('ss');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function getCells(){const r=G.rooftop;if(r.cells)return r.cells;const c=[];for(let row=0;row<r.rows;row++)for(let col=0;col<r.cols;col++)c.push([row,col]);return c;}
function isSafe(r,c){return G.rooftop.safe.some(s=>s.r===r&&s.c===c);}
function onBoard(r,c){return getCells().some(([cr,cc])=>cr===r&&cc===c);}
function isEdge(r,c){const cells=getCells();if(!cells.some(([cr,cc])=>cr===r&&cc===c))return false;return[[0,1],[0,-1],[1,0],[-1,0]].some(([dr,dc])=>!cells.some(([cr,cc])=>cr===r+dr&&cc===c+dc));}

function renderGame(){renderBoard();renderPbar();renderSelPreview();renderCards();renderLog();}

function renderBoard(){
  const grid=document.getElementById('rgrid');
  const cells=getCells();let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
  const rows=mr+1,cols=mc+1;
  // スマホ対応: 画面幅に応じてセルサイズを動的計算
  const gap=3;
  const maxW=Math.min(window.innerWidth-80,340); // コンパス方位ラベル分を引く
  const cellByW=Math.floor((maxW-(cols-1)*gap)/cols);
  const cellSize=Math.max(38,Math.min(cellByW,54));
  grid.style.cssText=`display:grid;grid-template-columns:repeat(${cols},${cellSize}px);grid-template-rows:repeat(${rows},${cellSize}px);width:${cols*cellSize+(cols-1)*gap}px;height:${rows*cellSize+(rows-1)*gap}px;gap:${gap}px;`;
  grid.innerHTML='';
  const cmap={};cells.forEach(([r,c])=>{cmap[`${r},${c}`]=true;});
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    if(!cmap[`${r},${c}`]){el.className='rcell empty-cell';grid.appendChild(el);continue;}
    const safe=isSafe(r,c),edge=isEdge(r,c),hasPawn=G.pawn&&G.pawn.r===r&&G.pawn.c===c;
    el.className='rcell'+(safe?' safe':edge?' edge':'')+(hasPawn?' has-pawn':'');
    if(hasPawn){el.innerHTML=`<svg class="pawn-svg" width="38" height="44" viewBox="0 0 38 44">${G.chara.svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1]}</svg>`;}
    else if(safe){el.innerHTML='<div class="safe-text">安全圏</div>';}
    grid.appendChild(el);
  }}
}

/* ===== 重み付きサイコロ ===== */
// 普通: 均等 [1,1,1,1,1,1]
// 強く: 大きい目寄り [1,1,2,2,3,3] → 4,5,6が出やすい
// 弱く: 小さい目寄り [3,3,2,2,1,1] → 1,2,3が出やすい
function weightedRoll(mode){
  const weights={
    normal:[1,1,1,1,1,1],
    strong:[1,1,2,3,3,4],
    weak:  [4,3,3,2,1,1]
  }[mode]||[1,1,1,1,1,1];
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<6;i++){r-=weights[i];if(r<=0)return i+1;}
  return 6;
}

function doRollDice(mode='normal'){
  // ポップアップ内にアニメ用サイコロ絵文字表示
  const modeLabel={normal:'普通に振る',strong:'強く振る',weak:'弱く振る'}[mode]||'振る';
  const modeTip={normal:'出目は均等です',strong:'大きい目が出やすい！',weak:'小さい目が出やすい！'}[mode]||'';

  // サイコロアニメ用の一時ポップアップ
  document.getElementById('popup-icon').innerHTML='🎲';
  document.getElementById('popup-title').innerHTML=modeLabel+'!';
  document.getElementById('popup-body').innerHTML=`<div id="roll-anim" style="font-size:52px;line-height:1;margin:8px 0;">⚀</div><div style="font-size:11px;color:#888;">${modeTip}</div>`;
  document.getElementById('popup-btns').innerHTML='';
  document.getElementById('popup').style.display='flex';

  const animEl=document.getElementById('roll-anim');
  let cnt=0;
  const iv=setInterval(()=>{
    SFX.diceRattle();
    animEl.textContent=DFACES[Math.floor(Math.random()*6)];
    animEl.classList.toggle('dice-anim');
    if(++cnt>10){
      clearInterval(iv);
      const r=weightedRoll(mode);
      animEl.textContent=DFACES[r-1];
      SFX.diceResult();
      setTimeout(()=>{hidePopup();processRoll(r,mode);},600);
    }
  },60);
}

function getCharaLine(chara, approaching){
  const lines = CHARA_LINES[chara.name];
  const pool = lines ? (approaching ? lines.approach : lines.retreat) : (approaching ? ["そっちに行くよ"] : ["近づかないで！"]);
  return pool[Math.floor(Math.random()*pool.length)];
}

/* 安全圏までのマンハッタン距離（最小） */
function distToSafe(r,c){
  return Math.min(...G.rooftop.safe.map(s=>Math.abs(s.r-r)+Math.abs(s.c-c)));
}
function processRoll(result,mode){
  const modeStr={normal:'',strong:'【強振り】',weak:'【弱振り】'}[mode]||'';
  const p=G.players[G.cur],card=p.cards[G.selCard],dir=card.dirs[result];
  p.cards[G.selCard].used=true;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};const [dr,dc]=dm[dir];const nr=G.pawn.r+dr,nc=G.pawn.c+dc;
  addLog(`${modeStr}出目:${result} → ${DL[dir]}へ移動`);

  const prevDist=distToSafe(G.pawn.r,G.pawn.c);
  const nextDist=distToSafe(nr,nc);
  const approaching=nextDist<prevDist;
  const charaLine=getCharaLine(G.chara,approaching);

  // 第1ポップアップ: 出目 + 選んだカード
  showPopup(DFACES[result-1],`${result}が出ました！`,
    makePopupVCard(card),
    [{label:'続ける',cls:'only',action:()=>{
      SFX.confirm();
      G.pawn={r:nr,c:nc};renderBoard();SFX.charaMove();
      const lineColor=approaching?'#065f46':'#b91c1c';
      const lineIcon=approaching?'💬':'😠';
      // 第2ポップアップ: キャラセリフ + 移動方向
      showPopup(lineIcon,
        `${G.chara.name}「${charaLine}」`,
        `<span style="color:${lineColor};font-size:12px;">${G.chara.name}</span>が<b>「${DL[dir]}」</b>へ動きました。`,
        [{label:'続ける',cls:'only',action:()=>{
          SFX.confirm();
          if(onBoard(nr,nc)&&isSafe(nr,nc)){showResult(true,result,dir,card);return;}
          if(!onBoard(nr,nc)){
            // 転落ポップアップを挿入
            G.chara.gender==='female' ? SFX.screamFemale() : SFX.screamMale();
            showPopup('💥',
              `${G.chara.name}は屋上から転落してしまいました…`,
              '',
              [{label:'続ける',cls:'only',action:()=>{
                SFX.confirm();showResult(false,result,dir,card);
              }}]);
            return;
          }
          G.turns++;
          if(G.players.every(pl=>pl.cards.every(c=>c.used))){
            // カード切れ → 配り直し
            redistributeCards();
            return;
          }
          nextTurn();
        }}]);
    }}]);
}

function redistributeCards(){
  // 全カードをシャッフルして配り直し
  const total=G.players.length;
  const shuffled=[...CARDS].sort(()=>Math.random()-.5);
  const cpp=Math.floor(12/total);
  G.players.forEach((p,i)=>{
    p.cards=shuffled.slice(i*cpp,(i+1)*cpp).map(c=>({...c,used:false}));
  });
  G.cur=0;G.phase='select';G.selCard=null;
  renderGame();
  showPopup('🃏','呼びかけカードを配り直します！',
    `全員のカードがなくなりました。<br>新たなカードで続けましょう！`,
    [{label:'続ける',cls:'only',action:()=>{
      SFX.confirm();popupTurnStart(0);
    }}]);
}

function nextTurn(){
  let next=(G.cur+1)%G.players.length,t=0;
  while(G.players[next].cards.every(c=>c.used)&&t<G.players.length){next=(next+1)%G.players.length;t++;}
  G.cur=next;G.phase='select';G.selCard=null;
  renderGame();addLog(`--- ${G.players[next].name}のターン ---`);popupTurnStart(next);
}

function renderLog(){const el=document.getElementById('glog');if(!el)return;el.innerHTML='';G.log.slice(-8).forEach((e,i,a)=>{const d=document.createElement('div');d.className='log-e'+(i===a.length-1?' last':'');d.textContent=e;el.appendChild(d);});el.scrollTop=el.scrollHeight;}

/* ===== エンディングセリフ ===== */
const WIN_LINES = {
  "かわいいOL":       ["生きていてよかった…本当にありがとう","刑事さんに出会えてよかったよ","思いとどまれてよかった。ありがとう"],
  "絶望したサラリーマン": ["助かってよかった。ありがとう","刑事さんのおかげだよ。本当に","まだ生きられるんだな…ありがとう"],
  "太った女性":       ["思いとどまってよかったよ","刑事さんありがとう、助かったわ","生きてみようって思えたよ"],
  "メンヘラ女性":     ["…助けてくれてありがとう","生きていてよかった","刑事さんがいてくれてよかったよ"],
  "老人":             ["ありがとうな、助かったよ","まだ生きられそうだ","刑事さんに会えてよかったよ"],
  "高校生":           ["ありがとう！助かったよ！","生きてよかった！","刑事さんがいてくれてよかった"],
  "シングルマザー":   ["助かってよかった。子どものためにも","刑事さんありがとう、思いとどまれたよ","生きていてよかったわ"],
  "ニート青年":       ["…助けてくれてありがとう","生きてみようと思う、ありがとう","刑事さんがいてくれてよかった"],
  "子持ち主婦":       ["思いとどまってよかったよ","刑事さんありがとう、助かったわ","子どもの顔が浮かんで…よかった"],
  "中年男性":         ["助かってよかった。ありがとう","刑事さんのおかげだよ","まだやり直せる気がしてきた"]
};
const LOSE_COMFORT = [
  "あんたはよくやったよ。仕方なかった",
  "俺たちにできることは全部やった",
  "責めるな。お前のせいじゃない",
  "次は必ず救える。諦めるな",
  "精一杯やった。それで十分だ",
  "今日のことは忘れるな。でも前を向け",
  "俺も悔しい。でも、お前はよく頑張った"
];

function getWinLine(chara){
  const pool=WIN_LINES[chara.name]||["思いとどまってよかったよ","刑事さんありがとう","助かってよかった"];
  return pool[Math.floor(Math.random()*pool.length)];
}
function getLoseComfort(){
  return LOSE_COMFORT[Math.floor(Math.random()*LOSE_COMFORT.length)];
}

function showResult(win,result,dir,card,outCards){
  win ? SFX.win() : SFX.lose();

  if(win){
    // 救出成功：確保対象のセリフポップアップ → 結果画面
    const line=getWinLine(G.chara);
    showPopup('😊',
      `${G.chara.name}「${line}」`,
      `<span style="color:#065f46;font-size:12px;font-weight:700;">無事救出成功！</span>`,
      [{label:'続ける',cls:'only',action:()=>{
        SFX.confirm();_showResultScreen(win,result,dir,card,outCards);
      }}]);
  } else {
    // 全員敗北：同僚のセリフポップアップ → 結果画面
    const cpus=G.players.filter(pl=>pl.isCpu);
    const comforter=cpus.length>0?cpus[Math.floor(Math.random()*cpus.length)]:{name:'同僚'};
    const comfort=getLoseComfort();
    showPopup('😔',
      `${comforter.name}「${comfort}」`,
      `<span style="color:#7f1d1d;font-size:12px;">…チーム全員、精一杯やった。</span>`,
      [{label:'続ける',cls:'only',action:()=>{
        SFX.confirm();_showResultScreen(win,result,dir,card,outCards);
      }}]);
  }
}

function _showResultScreen(win,result,dir,card,outCards){
  const rs=document.getElementById('rs');rs.className='screen '+(win?'r-win':'r-lose');
  document.getElementById('result-chara').innerHTML=G.chara.svg.replace('width="38"','width="64"').replace('height="44"','height="74"');
  document.getElementById('rtitle').textContent=win?'救出成功！':'全員敗北…';
  document.getElementById('rtitle').style.color='#FFE566';
  document.getElementById('rsub').innerHTML=win?`<b style="color:#FFE566">${G.chara.name}</b>を無事救出！<br>チームワークの勝利です！`:outCards?`呼びかけが尽きた…<br><b style="color:#FFE566">${G.chara.name}</b>を救えませんでした。`:`<b style="color:#FFE566">${G.chara.name}</b>が屋上から落下…<br>もう少しのところでした。`;
  document.getElementById('rdetail').innerHTML=`${card.emoji} 「${card.serif}」<br>出目 ${result} → ${DL[dir]} へ<br>経過ターン：${G.turns+1}ターン`;
  showScreen('rs');
}
