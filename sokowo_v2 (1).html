<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique+Soft&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;touch-action:manipulation;}
#gc{background:linear-gradient(180deg,#87CEEB 0%,#c5e8f7 70%,#e8f4fd 100%);width:100vw;height:100dvh;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.screen{display:none;flex:1;overflow:hidden;}.screen.active{display:flex;flex-direction:column;}

/* SETUP */
#ss{flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0d4a82 0%,#1a6fb5 50%,#4a9fd4 100%);padding:20px 16px;text-align:center;overflow-y:auto;}
#ss.active{display:flex;}
.gtitle{font-family:'Zen Antique Soft',serif;font-size:36px;font-weight:900;color:#FFE566;text-shadow:3px 3px 0 #5a2d00,-1px -1px 0 #5a2d00;letter-spacing:4px;margin-bottom:4px;}
.gsubt{color:rgba(255,255,255,.7);font-size:12px;letter-spacing:2px;margin-bottom:20px;}
.sbox{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:16px;padding:16px 18px;width:100%;max-width:440px;margin-bottom:12px;}
.sbox-title{color:#FFE566;font-size:12px;letter-spacing:2px;margin-bottom:12px;font-weight:700;}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.sel-btn{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:18px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
.sel-btn.chosen{background:#fff!important;color:#0d4a82!important;border-color:#fff!important;box-shadow:0 0 0 3px rgba(255,255,255,.35)!important;font-weight:900;}
.start-btn{border:none;padding:14px 44px;font-size:17px;font-weight:700;border-radius:50px;cursor:not-allowed;font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;transition:all .2s;background:rgba(255,255,255,.15);color:rgba(255,255,255,.35);}
.start-btn.ready{background:#fff!important;color:#0d4a82!important;box-shadow:0 4px 20px rgba(0,0,0,.35)!important;cursor:pointer;}
.note{color:rgba(255,255,255,.65);font-size:11px;margin-bottom:14px;min-height:18px;}

/* PLAYER BAR */
.pbar{display:flex;gap:4px;padding:6px 10px;background:rgba(13,74,130,.9);flex-wrap:wrap;align-items:center;flex-shrink:0;}
.pbar-title{font-family:'Zen Antique Soft',serif;font-size:12px;color:#FFE566;letter-spacing:2px;margin-right:6px;}
.pchip{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.18);border-radius:50px;padding:3px 9px;border:1px solid rgba(255,255,255,.25);font-size:11px;color:white;}
.pchip.active{background:#FFE566;color:#0d4a82;border-color:#FFE566;font-weight:700;}
.cpu-tag{font-size:9px;background:rgba(255,255,255,.3);border-radius:3px;padding:0 3px;margin-left:2px;}
.pchip.active .cpu-tag{background:rgba(0,0,0,.15);}

/* GAME SCREEN - 縦積みレイアウト */
#gs.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}
.game-body{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:6px;padding:6px 8px;}

/* 上段: 屋上 + ステータス横並び */
.top-row{display:flex;gap:8px;align-items:flex-start;}

/* ROOFTOP */
.roof-wrap{flex:0 0 auto;}
.compass-label{text-align:center;font-size:10px;font-weight:700;color:#4a6fa5;}
.compass-side{display:flex;align-items:center;gap:2px;}
.compass-lr{font-size:10px;font-weight:700;color:#4a6fa5;writing-mode:vertical-rl;}
#rgrid{display:grid;position:relative;gap:2px;}
.rcell{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;transition:all .3s;background:linear-gradient(135deg,#d4e8f0,#c2dae8);border:2px solid #9bbdd4;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 2px 4px rgba(0,0,50,.12);}
.rcell::after{content:'';position:absolute;inset:0;border-radius:4px;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 60%);pointer-events:none;}
.rcell.safe{background:linear-gradient(135deg,#a8edbc,#6dcc88);border-color:#3da85a;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 0 0 2px rgba(61,168,90,.3),0 2px 6px rgba(0,80,0,.2);}
.rcell.edge{background:linear-gradient(135deg,#f5c0b0,#e8a090);border-color:#c0604a;}
.rcell.has-pawn{background:linear-gradient(135deg,#fff3c4,#ffe080);border-color:#d4a800;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 0 0 2px rgba(212,168,0,.4);}
.rcell.empty-cell{background:transparent;border:none;box-shadow:none;}
.rcell.empty-cell::after{display:none;}
.rcell:not(.safe):not(.edge):not(.has-pawn):not(.empty-cell)::before{content:'';position:absolute;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.35);top:4px;left:4px;pointer-events:none;}
.safe-text{font-size:7px;font-weight:800;color:#1a6b35;}
.pawn-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;}
.roof-legend{display:flex;gap:5px;margin-top:4px;font-size:9px;align-items:center;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:3px;}
.leg-box{width:11px;height:11px;border-radius:2px;flex-shrink:0;}

/* 右上: ステータス + キャラ + ログ */
.top-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
.icard{background:rgba(255,255,255,.88);border-radius:10px;padding:7px 9px;border:1px solid rgba(255,255,255,.55);box-shadow:0 2px 6px rgba(0,0,0,.1);}
.icard h4{font-size:9px;color:#0d4a82;margin-bottom:4px;letter-spacing:1px;font-weight:700;border-bottom:1px solid rgba(0,0,0,.08);padding-bottom:3px;}
.status-msg{font-size:11px;color:#0d4a82;font-weight:500;line-height:1.4;}
.phase-tag{display:inline-block;font-size:8px;padding:1px 6px;border-radius:4px;font-weight:700;letter-spacing:1px;margin-right:3px;}
.pt-sel{background:#dbeafe;color:#1e40af;}.pt-roll{background:#fef3c7;color:#92400e;}.pt-cpu{background:#e8f5e9;color:#1b5e20;}

/* サイコロアニメ（ポップアップ内で使用） */
@keyframes droll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(15deg) scale(1.1)}50%{transform:rotate(-10deg) scale(.95)}75%{transform:rotate(8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
.dice-anim{animation:droll .5s ease;}

/* 4択サイコロポップアップ用スタイル */
.roll-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.roll-choice-btn{
  border:2px solid transparent;border-radius:14px;padding:10px 6px;
  font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .18s;display:flex;flex-direction:column;
  align-items:center;gap:3px;
}
.roll-choice-btn:active{transform:scale(.96);}
.rc-normal{background:#e8f0fe;border-color:#4a7fd4;color:#1a3a82;}
.rc-strong{background:#fff0e0;border-color:#e07820;color:#7a3a00;}
.rc-weak{background:#e8f8ee;border-color:#3da85a;color:#1a5a2a;}
.rc-cancel{background:#f5f5f5;border-color:#bbb;color:#666;}
.rc-label{font-size:11px;font-weight:700;}
.rc-desc{font-size:9px;font-weight:400;opacity:.8;line-height:1.3;text-align:center;}
.rc-dice-preview{font-size:18px;line-height:1;}

/* ===== 縦長呼びかけカード ===== */
.cards-section-label{font-size:10px;color:#0d4a82;font-weight:700;margin-bottom:4px;letter-spacing:.5px;}
.cards-col{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:5px;
}

/* 縦長カード本体 */
.vcard{
  background:#fff;
  border:2px solid #4a9fd4;
  border-radius:10px;
  cursor:pointer;
  transition:all .18s;
  overflow:hidden;
  position:relative;
  display:flex;
  flex-direction:column;
}
.vcard:active:not(.used){border-color:#FFE566;transform:scale(0.97);box-shadow:0 3px 12px rgba(0,0,0,.18);}
.vcard.sel{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.45);}
.vcard.used{opacity:.26;cursor:not-allowed;filter:grayscale(1);}
.sel-badge{position:absolute;top:2px;right:2px;background:#e8b84b;color:#5a3000;font-size:7px;font-weight:700;border-radius:3px;padding:1px 3px;z-index:2;}

/* カード上部: 絵文字 + セリフ */
.card-header{
  display:flex;align-items:center;gap:3px;
  padding:4px 5px 3px;
  border-bottom:1px solid rgba(0,0,0,.08);
}
.card-emoji-lg{font-size:15px;line-height:1;flex-shrink:0;}
.card-serif-v{font-size:7px;font-weight:700;color:#c0392b;line-height:1.3;flex:1;}

/* コンパスグリッド */
.card-compass{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto auto auto;
  gap:2px;
  padding:3px;
  background:#f0f4ff;
  flex:1;
}
.cc{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:4px;
  padding:2px 1px;
  min-height:24px;
}
.cc.cN{background:#dbeafe;grid-column:2;grid-row:1;}
.cc.cW{background:#fce7f3;grid-column:1;grid-row:2;}
.cc.cE{background:#fef3c7;grid-column:3;grid-row:2;}
.cc.cS{background:#d1fae5;grid-column:2;grid-row:3;}
.cc.ce{background:transparent;}
.cc-dir{font-size:9px;font-weight:900;line-height:1;margin-bottom:1px;}
.cN .cc-dir{color:#1e40af;}
.cE .cc-dir{color:#92400e;}
.cS .cc-dir{color:#065f46;}
.cW .cc-dir{color:#831843;}
.cc-dice{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;}
.pip-sm{width:10px;height:10px;flex-shrink:0;}

/* LOG */
.glog{font-size:10px;color:#333;line-height:1.6;max-height:44px;overflow-y:auto;}
.log-e{padding:1px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.log-e.last{font-weight:700;color:#0d4a82;}

/* RESULT */
#rs{flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;}
#rs.active{display:flex;}
.r-win{background:linear-gradient(180deg,#0d6b2e,#27ae60);}
.r-lose{background:linear-gradient(180deg,#4a0a0a,#c0392b);}
.rtitle{font-family:'Zen Antique Soft',serif;font-size:48px;font-weight:900;margin-bottom:10px;text-shadow:3px 3px 0 rgba(0,0,0,.3);animation:rpop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes rpop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.rsub{font-size:15px;color:rgba(255,255,255,.9);margin-bottom:20px;line-height:1.7;}
.rdetail{background:rgba(255,255,255,.15);border-radius:12px;padding:14px 20px;margin-bottom:20px;font-size:13px;color:rgba(255,255,255,.9);line-height:1.9;}
.retry-btn{background:white;border:none;padding:14px 44px;font-size:17px;font-weight:700;border-radius:50px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.result-chara{margin-bottom:8px;animation:rpop .6s cubic-bezier(.34,1.56,.64,1) .1s both;}

/* POPUP */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup-box{background:white;border-radius:20px;padding:22px 20px 18px;max-width:360px;width:94%;box-shadow:0 8px 40px rgba(0,0,0,.35);text-align:center;animation:popIn .25s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.popup-icon{font-size:40px;margin-bottom:8px;line-height:1;}
.popup-title{font-size:14px;font-weight:700;color:#0d4a82;margin-bottom:8px;line-height:1.5;}
.popup-body{font-size:12px;color:#333;line-height:1.7;margin-bottom:12px;}
.popup-body b{color:#c0392b;}
.popup-btns{display:flex;gap:10px;justify-content:center;}
.popup-btn{padding:11px 24px;border:none;border-radius:50px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .18s;}
.popup-btn.yes{background:#0d4a82;color:white;}
.popup-btn.no{background:#f0f0f0;color:#555;}
.popup-btn.only{background:#0d4a82;color:white;padding:11px 40px;}

/* ポップアップ内縦長カード */
.popup-vcard{
  display:inline-flex;flex-direction:column;
  border:2px solid #e8b84b;border-radius:10px;
  overflow:hidden;margin:4px auto 10px;
  width:140px;text-align:left;
  background:#fff;
}
.pvc-header{display:flex;align-items:center;gap:5px;padding:6px 8px 5px;border-bottom:1px solid rgba(232,184,75,.3);}
.pvc-emoji{font-size:22px;flex-shrink:0;}
.pvc-serif{font-size:9px;font-weight:700;color:#c0392b;line-height:1.3;flex:1;}
.pvc-compass{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:2px;padding:5px;background:#f0f4ff;}
.pvcc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:30px;border-radius:4px;padding:2px 1px;}
.pvcc.pvN{background:#dbeafe;grid-column:2;grid-row:1;}
.pvcc.pvW{background:#fce7f3;grid-column:1;grid-row:2;}
.pvcc.pvE{background:#fef3c7;grid-column:3;grid-row:2;}
.pvcc.pvS{background:#d1fae5;grid-column:2;grid-row:3;}
.pvcc.pve{background:transparent;}
.pvcc-dir{font-size:10px;font-weight:900;line-height:1;margin-bottom:2px;}
.pvN .pvcc-dir{color:#1e40af;}.pvE .pvcc-dir{color:#92400e;}.pvS .pvcc-dir{color:#065f46;}.pvW .pvcc-dir{color:#831843;}
.pvcc-dice{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;}
.pp-sm{width:10px;height:10px;flex-shrink:0;}
</style>

<div id="gc">
<!-- SETUP -->
<div id="ss" class="screen active">
  <div class="gtitle">そこを動くな！</div>
  <div class="gsubt">協力型 救出ゲーム</div>
  <div class="sbox">
    <div class="sbox-title">👤 人間プレイヤー数</div>
    <div class="btn-row" id="hrow">
      <button class="sel-btn" onclick="setPc(1)">1</button><button class="sel-btn" onclick="setPc(2)">2</button><button class="sel-btn" onclick="setPc(3)">3</button><button class="sel-btn" onclick="setPc(4)">4</button><button class="sel-btn" onclick="setPc(5)">5</button><button class="sel-btn" onclick="setPc(6)">6</button>
    </div>
  </div>
  <div class="sbox">
    <div class="sbox-title">🤖 CPUプレイヤー数（最大5台）</div>
    <div class="btn-row" id="crow">
      <button class="sel-btn" onclick="setCpu(0)">0</button><button class="sel-btn" onclick="setCpu(1)">1</button><button class="sel-btn" onclick="setCpu(2)">2</button><button class="sel-btn" onclick="setCpu(3)">3</button><button class="sel-btn" onclick="setCpu(4)">4</button><button class="sel-btn" onclick="setCpu(5)">5</button>
    </div>
  </div>
  <div class="note" id="snote">人間プレイヤー数を選んでください</div>
  <button class="start-btn" id="start-btn">ゲームを始める</button>
  <div style="margin-top:16px;color:rgba(255,255,255,.4);font-size:11px;">2〜6人 ｜ 1〜15分 ｜ 協力ゲーム</div>
</div>

<!-- GAME -->
<div id="gs" class="screen">
  <div class="pbar" id="pbar"><span class="pbar-title">参加者</span></div>
  <div class="game-body">
    <!-- 上段: 屋上 + ステータス/ログ横並び -->
    <div class="top-row">
      <!-- 左: 屋上 -->
      <div class="roof-wrap">
        <div class="compass-label" style="margin-bottom:2px;">北</div>
        <div class="compass-side">
          <div class="compass-lr">西</div>
          <div id="rgrid"></div>
          <div class="compass-lr">東</div>
        </div>
        <div class="compass-label" style="margin-top:2px;">南</div>
        <div class="roof-legend">
          <div class="leg-item"><div class="leg-box" style="background:linear-gradient(135deg,#a8edbc,#6dcc88);border:1.5px solid #3da85a;"></div><span style="color:#1a6b35;font-weight:700;">安全圏</span></div>
          <div class="leg-item"><div class="leg-box" style="background:linear-gradient(135deg,#f5c0b0,#e8a090);border:1.5px solid #c0604a;"></div><span style="color:#7a3020;">端</span></div>
        </div>
      </div>
      <!-- 右: ステータス + キャラ情報 + ログ -->
      <div class="top-right">
        <div class="icard"><div class="status-msg" id="smsg">カードを選んでください</div></div>
        <div id="chara-info" style="background:rgba(255,255,255,.7);border-radius:8px;padding:4px 7px;font-size:9px;color:#333;"></div>
        <div class="icard"><h4>📋 ログ</h4><div class="glog" id="glog"></div></div>
      </div>
    </div>

    <!-- カード一覧 -->
    <div>
      <div class="cards-section-label">🗣️ 呼びかけカード（<span id="ccount">0</span>枚残り）</div>
      <div class="cards-col" id="cgrid"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="rs" class="screen">
  <div class="result-chara" id="result-chara"></div>
  <div class="rtitle" id="rtitle"></div>
  <div class="rsub" id="rsub"></div>
  <div class="rdetail" id="rdetail"></div>
  <button class="retry-btn" onclick="showSetup()">もう一度遊ぶ</button>
</div>

<!-- POPUP -->
<div class="popup-overlay" id="popup" style="display:none;">
  <div class="popup-box">
    <div class="popup-icon" id="popup-icon"></div>
    <div class="popup-title" id="popup-title"></div>
    <div class="popup-body" id="popup-body"></div>
    <div class="popup-btns" id="popup-btns"></div>
  </div>
</div>
</div>

<script>
const ROOFTOPS=[
  {name:"標準屋上",cols:3,rows:5,safe:[{r:4,c:1}],start:{r:0,c:1}},
  {name:"L字屋上",cols:3,rows:4,cells:[[0,1],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2],[3,1]],safe:[{r:3,c:1}],start:{r:0,c:1}},
  {name:"T字屋上",cols:3,rows:5,cells:[[0,1],[1,0],[1,1],[1,2],[2,1],[3,1],[4,1]],safe:[{r:4,c:1}],start:{r:0,c:1}},
  {name:"広い屋上",cols:4,rows:4,safe:[{r:3,c:1},{r:3,c:2}],start:{r:0,c:1}},
  {name:"細長い屋上",cols:2,rows:6,safe:[{r:5,c:0},{r:5,c:1}],start:{r:0,c:0}},
  {name:"コの字屋上",cols:3,rows:4,cells:[[0,0],[0,1],[0,2],[1,0],[1,2],[2,0],[2,2],[3,0],[3,1],[3,2]],safe:[{r:3,c:1}],start:{r:0,c:1}},
  {name:"正方形屋上",cols:4,rows:4,safe:[{r:3,c:1},{r:3,c:2}],start:{r:0,c:1}},
  {name:"細道屋上",cols:1,rows:7,safe:[{r:6,c:0}],start:{r:0,c:0}},
  {name:"広場屋上",cols:5,rows:5,safe:[{r:4,c:2}],start:{r:0,c:2}},
  {name:"斜め屋上",cols:3,rows:5,cells:[[0,2],[1,1],[1,2],[2,0],[2,1],[3,0],[4,0]],safe:[{r:4,c:0}],start:{r:0,c:2}}
];
const CARDS=[
  {serif:"こっちに来い！",emoji:"👮",bg:"#e3f2fd",dirs:{1:"N",2:"E",3:"N",4:"W",5:"S",6:"E"}},
  {serif:"落ち着いて！",emoji:"🙏",bg:"#f3e5f5",dirs:{1:"S",2:"S",3:"N",4:"E",5:"W",6:"N"}},
  {serif:"話を聞かせてくれ！",emoji:"👂",bg:"#fff3e0",dirs:{1:"E",2:"N",3:"W",4:"S",5:"N",6:"S"}},

/* ===== サイコロSVG ===== */
function makeDiceSvg(face,size){
  const pips=[[],[{x:5,y:5}],[{x:2.5,y:2.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:5,y:5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:5},{x:7.5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}]];
  const ps=pips[face].map(p=>`<circle cx="${p.x}" cy="${p.y}" r="1.1" fill="#1a1a2e"/>`).join('');
  return `<svg viewBox="0 0 10 10" width="${size}" height="${size}"><rect width="10" height="10" rx="1.5" fill="white" stroke="#bbb" stroke-width=".5"/>${ps}</svg>`;
}

/* ===== 縦長カードHTML（ゲーム画面用） ===== */
function makeVCard(card, idx){
  const isSelected=G.selCard===idx, isUsed=card.used;
  const byDir={N:[],E:[],S:[],W:[]};
  for(let d=1;d<=6;d++) byDir[card.dirs[d]].push(d);

  function ccCell(dir,col,row){
    const faces=byDir[dir];
    const label={N:'北',E:'東',S:'南',W:'西'}[dir];
    if(!faces.length) return `<div class="cc ce" style="grid-column:${col};grid-row:${row};"></div>`;
    const dice=faces.map(f=>makeDiceSvg(f,11)).join('');
    return `<div class="cc c${dir}" style="grid-column:${col};grid-row:${row};">
      <div class="cc-dir">${label}</div>
      <div class="cc-dice">${dice}</div>
    </div>`;
  }

  const el=document.createElement('div');
  el.className='vcard'+(isUsed?' used':'')+(isSelected?' sel':'');
  el.innerHTML=`${isSelected?'<div class="sel-badge">選択中</div>':''}
    <div class="card-header" style="background:${card.bg};">
      <span class="card-emoji-lg">${card.emoji}</span>
      <span class="card-serif-v">「${card.serif}」</span>
    </div>
    <div class="card-compass">
      <div class="cc ce" style="grid-column:1;grid-row:1;"></div>${ccCell('N',2,1)}<div class="cc ce" style="grid-column:3;grid-row:1;"></div>
      ${ccCell('W',1,2)}<div class="cc ce" style="grid-column:2;grid-row:2;"></div>${ccCell('E',3,2)}
      <div class="cc ce" style="grid-column:1;grid-row:3;"></div>${ccCell('S',2,3)}<div class="cc ce" style="grid-column:3;grid-row:3;"></div>
    </div>`;
  if(!isUsed&&(G.phase==='select'||G.phase==='roll')) el.onclick=()=>selectCard(idx);
  return el;
}

/* ===== 縦長カードHTML（ポップアップ用） ===== */
function makePopupVCard(card){
  const byDir={N:[],E:[],S:[],W:[]};
  for(let d=1;d<=6;d++) byDir[card.dirs[d]].push(d);

/* SETUP */
function setPc(n){G.pc=n;document.querySelectorAll('#hrow .sel-btn').forEach((b,i)=>b.setAttribute('class','sel-btn'+(i+1===n?' chosen':'')));validateSetup();}
function setCpu(n){G.cpuCount=n;document.querySelectorAll('#crow .sel-btn').forEach((b,i)=>b.setAttribute('class','sel-btn'+(i===n?' chosen':'')));validateSetup();}
function validateSetup(){
  const h=G.pc,c=G.cpuCount,btn=document.getElementById('start-btn');
  if(h<0){document.getElementById('snote').textContent='人間プレイヤー数を選んでください';btn.setAttribute('class','start-btn');btn.onclick=null;return;}
  if(c<0){document.getElementById('snote').textContent='CPUプレイヤー数を選んでください';btn.setAttribute('class','start-btn');btn.onclick=null;return;}
  const total=h+c,ok=total>=2&&total<=6;
  if(ok){btn.setAttribute('class','start-btn ready');btn.onclick=startGame;}else{btn.setAttribute('class','start-btn');btn.onclick=null;}
  document.getElementById('snote').textContent=total<2?`合計${total}人 → 最低2人必要です`:total>6?`合計${total}人 → 最大6人まで`:`合計${total}人（人間${h}人 + CPU${c}台）でスタート！`;
}

function startGame(){
  const ridx=Math.floor(Math.random()*ROOFTOPS.length);
  G.rooftop=JSON.parse(JSON.stringify(ROOFTOPS[ridx]));
  G.chara=CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)];
  const shuffled=[...CARDS].sort(()=>Math.random()-.5);
  const total=G.pc+G.cpuCount,cpp=Math.floor(12/total);
  G.players=[];
  const hnames=["刑事A","刑事B","刑事C","刑事D","刑事E","刑事F"];
  for(let i=0;i<total;i++){const isCpu=i>=G.pc;G.players.push({name:isCpu?`CPU${i-G.pc+1}`:hnames[i],isCpu,cards:shuffled.slice(i*cpp,(i+1)*cpp).map(c=>({...c,used:false}))});}
  G.cur=0;G.pawn={...G.rooftop.start};G.phase="select";G.selCard=null;G.log=[];G.turns=0;
  showScreen('gs');renderGame();
  document.getElementById('chara-info').innerHTML=`${G.chara.svg.replace('width="38"','width="22"').replace('height="44"','height="26"')} <b style="color:${G.chara.color}">${G.chara.name}</b><br><span style="font-size:8px;">${G.chara.desc}</span>`;
  addLog(`屋上「${G.rooftop.name}」に${G.chara.name}が現れた！`);
  showPopup('🏢','緊急事態発生！',`屋上に飛び降りようとしている者がおり、<br>あなたたち刑事は駆けつけました。<br><br><b>${G.chara.name}</b>を安全圏へ導いてください！`,
    [{label:'了解！',cls:'only',action:()=>popupTurnStart(0)}]);
}

function popupTurnStart(idx){
  const p=G.players[idx];
  if(p.isCpu){
    showPopup('🤖',`${p.name}のターン`,`CPUが呼びかけカードを選んでいます…`,
      [{label:'続ける',cls:'only',action:()=>{
        const best=cpuPickCard();if(best===-1)return;
        const card=p.cards[best];
        G.selCard=best;G.phase='roll';renderSelPreview();renderCards();renderStatus();
        addLog(`${p.name}「${card.serif}」を選んだ`);
        showPopup('🤖',`${p.name}が選びました`,
          makePopupVCard(card)+`<div style="margin-top:4px;font-size:12px;color:#333;">${p.name}がサイコロを振ります</div>`,
          [{label:'続ける',cls:'only',action:()=>doRollDice('normal')}]);
      }}]);
  } else {
    showPopup('🚔',`${p.name}（あなた）の番です`,`呼びかけカードを選んで、<b>${G.chara.name}</b>を安全圏に導いてください！`,
      [{label:'カードを選ぶ',cls:'only',action:()=>{}}]);
  }
}

function cpuPickCard(){
  const p=G.players[G.cur];const avail=p.cards.map((c,i)=>({c,i})).filter(({c})=>!c.used);if(!avail.length)return -1;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
  const bd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(G.pawn.r,G.pawn.c,s.r,s.c)),999);
  let best=null,bs=-999;
  avail.forEach(({c:card,i})=>{let score=0;for(let d=1;d<=6;d++){const [dr,dc]=dm[card.dirs[d]];const nr=G.pawn.r+dr,nc=G.pawn.c+dc;if(!onBoard(nr,nc)){score-=3;}else if(isSafe(nr,nc)){score+=6;}else{const nd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(nr,nc,s.r,s.c)),999);score+=nd<bd?1:nd>bd?-1:0;}}if(score>bs){bs=score;best=i;}});
  return best!==null?best:avail[0].i;
}


function showSetup(){G.pc=-1;G.cpuCount=-1;document.querySelectorAll('#hrow .sel-btn,#crow .sel-btn').forEach(b=>b.setAttribute('class','sel-btn'));document.getElementById('snote').textContent='人間プレイヤー数を選んでください';const btn=document.getElementById('start-btn');btn.setAttribute('class','start-btn');btn.onclick=null;showScreen('ss');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function getCells(){const r=G.rooftop;if(r.cells)return r.cells;const c=[];for(let row=0;row<r.rows;row++)for(let col=0;col<r.cols;col++)c.push([row,col]);return c;}
function isSafe(r,c){return G.rooftop.safe.some(s=>s.r===r&&s.c===c);}
function onBoard(r,c){return getCells().some(([cr,cc])=>cr===r&&cc===c);}
function isEdge(r,c){const cells=getCells();if(!cells.some(([cr,cc])=>cr===r&&cc===c))return false;return[[0,1],[0,-1],[1,0],[-1,0]].some(([dr,dc])=>!cells.some(([cr,cc])=>cr===r+dr&&cc===c+dc));}

function renderGame(){renderBoard();renderPbar();renderSelPreview();renderCards();renderStatus();renderLog();}

function renderBoard(){
  const grid=document.getElementById('rgrid');
  const cells=getCells();let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
  const rows=mr+1,cols=mc+1;
  grid.style.cssText=`display:grid;grid-template-columns:repeat(${cols},44px);grid-template-rows:repeat(${rows},44px);width:${cols*44+(cols-1)*2}px;height:${rows*44+(rows-1)*2}px;gap:2px;`;
  grid.innerHTML='';
  const cmap={};cells.forEach(([r,c])=>{cmap[`${r},${c}`]=true;});
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    if(!cmap[`${r},${c}`]){el.className='rcell empty-cell';grid.appendChild(el);continue;}
    const safe=isSafe(r,c),edge=isEdge(r,c),hasPawn=G.pawn&&G.pawn.r===r&&G.pawn.c===c;
    el.className='rcell'+(safe?' safe':edge?' edge':'')+(hasPawn?' has-pawn':'');
    if(hasPawn){el.innerHTML=`<svg class="pawn-svg" width="38" height="44" viewBox="0 0 38 44">${G.chara.svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1]}</svg>`;}
    else if(safe){el.innerHTML='<div class="safe-text">安全圏</div>';}
    grid.appendChild(el);
  }}
}

function renderPbar(){
  const bar=document.getElementById('pbar');bar.innerHTML=`<span class="pbar-title">参加者</span>`;
  G.players.forEach((p,i)=>{const ch=document.createElement('div');ch.className='pchip'+(i===G.cur?' active':'');const rem=p.cards.filter(c=>!c.used).length;ch.innerHTML=`${p.name}${p.isCpu?`<span class="cpu-tag">CPU</span>`:''} <span style="font-size:9px;opacity:.7;">(${rem}枚)</span>`;bar.appendChild(ch);});
}

  // サイコロ行は削除したため何もしない
}

function renderCards(){
  const p=G.players[G.cur];

function selectCard(idx){
  const p=G.players[G.cur];if(p.cards[idx].used)return;
  const card=p.cards[idx];
  G.selCard=idx;G.phase='roll';
  renderCards();
  showPopup('❓','この呼びかけカードでいいですか？',
    makePopupVCard(card),
    [
      {label:'はい',cls:'yes',action:()=>{
        renderStatus();addLog(`${p.name}「${card.serif}」を選んだ`);
        showDiceChoicePopup(card);
      }},
      {label:'いいえ',cls:'no',action:()=>cancelSelect()}
    ]
  );
}

/* ===== 4択サイコロポップアップ ===== */
function showDiceChoicePopup(card){
  document.getElementById('popup-icon').innerHTML='🎲';
  document.getElementById('popup-title').innerHTML='どのくらい振りますか？';
  document.getElementById('popup-body').innerHTML=
    makePopupVCard(card)+
    `<div class="roll-choices">
      <button class="roll-choice-btn rc-normal" onclick="hidePopup();doRollDice('normal')">
        <span class="rc-dice-preview">🎲</span>
        <span class="rc-label">普通に振る</span>
        <span class="rc-desc">1〜6 均等</span>
      </button>
      <button class="roll-choice-btn rc-strong" onclick="hidePopup();doRollDice('strong')">
        <span class="rc-dice-preview">💪</span>
        <span class="rc-label">強く振る</span>
        <span class="rc-desc">大きい目が<br>出やすい</span>
      </button>
      <button class="roll-choice-btn rc-weak" onclick="hidePopup();doRollDice('weak')">
        <span class="rc-dice-preview">🤏</span>
        <span class="rc-label">弱く振る</span>
        <span class="rc-desc">小さい目が<br>出やすい</span>
      </button>
      <button class="roll-choice-btn rc-cancel" onclick="hidePopup();cancelSelect()">
        <span class="rc-dice-preview">↩</span>
        <span class="rc-label">振らない</span>
        <span class="rc-desc">カードを<br>選び直す</span>
      </button>
    </div>`;
  document.getElementById('popup-btns').innerHTML='';
  document.getElementById('popup').style.display='flex';
}

function cancelSelect(){
  G.selCard=null;G.phase='select';renderSelPreview();renderStatus();renderCards();addLog('カードを選び直します...');
}

function renderStatus(){
  const p=G.players[G.cur];
  document.getElementById('smsg').innerHTML=G.phase==='select'
    ?`<span class="phase-tag ${p.isCpu?'pt-cpu':'pt-sel'}">${p.isCpu?'CPU思考中':'カード選択'}</span>${p.isCpu?'CPUが考えています...':p.name+'のターン。呼びかけカードを選んでください'}`
    :`<span class="phase-tag pt-roll">サイコロ</span>サイコロを振って自殺者を動かす！`;
}

/* ===== 重み付きサイコロ ===== */
// 普通: 均等 [1,1,1,1,1,1]
// 強く: 大きい目寄り [1,1,2,2,3,3] → 4,5,6が出やすい
// 弱く: 小さい目寄り [3,3,2,2,1,1] → 1,2,3が出やすい
function weightedRoll(mode){
  const weights={
    normal:[1,1,1,1,1,1],
    strong:[1,1,2,3,3,4],
    weak:  [4,3,3,2,1,1]
  }[mode]||[1,1,1,1,1,1];
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<6;i++){r-=weights[i];if(r<=0)return i+1;}
  return 6;
}

function doRollDice(mode='normal'){
  // ポップアップ内にアニメ用サイコロ絵文字表示
  const modeLabel={normal:'普通に振る',strong:'強く振る',weak:'弱く振る'}[mode]||'振る';
  const modeTip={normal:'出目は均等です',strong:'大きい目が出やすい！',weak:'小さい目が出やすい！'}[mode]||'';

  // サイコロアニメ用の一時ポップアップ
  document.getElementById('popup-icon').innerHTML='🎲';
  document.getElementById('popup-title').innerHTML=modeLabel+'!';
  document.getElementById('popup-body').innerHTML=`<div id="roll-anim" style="font-size:52px;line-height:1;margin:8px 0;">⚀</div><div style="font-size:11px;color:#888;">${modeTip}</div>`;
  document.getElementById('popup-btns').innerHTML='';
  document.getElementById('popup').style.display='flex';

  const animEl=document.getElementById('roll-anim');
  let cnt=0;
  const iv=setInterval(()=>{
    animEl.textContent=DFACES[Math.floor(Math.random()*6)];
    animEl.classList.toggle('dice-anim');
    if(++cnt>10){
      clearInterval(iv);
      const r=weightedRoll(mode);
      animEl.textContent=DFACES[r-1];
      setTimeout(()=>{hidePopup();processRoll(r,mode);},600);
    }
  },60);
}

function processRoll(result,mode){
  const modeStr={normal:'',strong:'【強振り】',weak:'【弱振り】'}[mode]||'';
  const p=G.players[G.cur],card=p.cards[G.selCard],dir=card.dirs[result];
  p.cards[G.selCard].used=true;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1]};const [dr,dc]=dm[dir];const nr=G.pawn.r+dr,nc=G.pawn.c+dc;
  addLog(`${modeStr}出目:${result} → ${DL[dir]}へ移動`);G.pawn={r:nr,c:nc};renderBoard();
  showPopup(DFACES[result-1],`${result}が出ました！`,`<b>${G.chara.name}</b>が<b>「${DL[dir]}」</b>へ動きました。`,
    [{label:'続ける',cls:'only',action:()=>{
      if(onBoard(nr,nc)&&isSafe(nr,nc)){showResult(true,result,dir,card);return;}
      if(!onBoard(nr,nc)){showResult(false,result,dir,card);return;}
      G.turns++;if(G.players.every(pl=>pl.cards.every(c=>c.used))){showResult(false,result,dir,card,true);return;}
      nextTurn();
    }}]);
}

function nextTurn(){
  let next=(G.cur+1)%G.players.length,t=0;
  while(G.players[next].cards.every(c=>c.used)&&t<G.players.length){next=(next+1)%G.players.length;t++;}
  G.cur=next;G.phase='select';G.selCard=null;
  renderGame();addLog(`--- ${G.players[next].name}のターン ---`);popupTurnStart(next);
}

function addLog(msg){G.log.push(msg);const el=document.getElementById('glog');if(!el)return;el.innerHTML='';G.log.slice(-8).forEach((e,i,a)=>{const d=document.createElement('div');d.className='log-e'+(i===a.length-1?' last':'');d.textContent=e;el.appendChild(d);});el.scrollTop=el.scrollHeight;}
function renderLog(){const el=document.getElementById('glog');if(!el)return;el.innerHTML='';G.log.slice(-8).forEach((e,i,a)=>{const d=document.createElement('div');d.className='log-e'+(i===a.length-1?' last':'');d.textContent=e;el.appendChild(d);});el.scrollTop=el.scrollHeight;}

function showResult(win,result,dir,card,outCards){
  const rs=document.getElementById('rs');rs.className='screen '+(win?'r-win':'r-lose');
  document.getElementById('result-chara').innerHTML=G.chara.svg.replace('width="38"','width="64"').replace('height="44"','height="74"');
  document.getElementById('rtitle').textContent=win?'救出成功！':'全員敗北…';
  document.getElementById('rtitle').style.color='#FFE566';
  document.getElementById('rsub').innerHTML=win?`<b style="color:#FFE566">${G.chara.name}</b>を無事救出！<br>チームワークの勝利です！`:outCards?`呼びかけが尽きた…<br><b style="color:#FFE566">${G.chara.name}</b>を救えませんでした。`:`<b style="color:#FFE566">${G.chara.name}</b>が屋上から落下…<br>もう少しのところでした。`;
  document.getElementById('rdetail').innerHTML=`${card.emoji} 「${card.serif}」<br>出目 ${result} → ${DL[dir]} へ<br>経過ターン：${G.turns+1}ターン`;
  showScreen('rs');
}
</script>
