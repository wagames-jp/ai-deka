<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Antique+Soft&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;-webkit-font-smoothing:antialiased;}
body{font-family:'Noto Sans JP',sans-serif;font-size:16px;touch-action:manipulation;}
#gc{width:100vw;height:100dvh;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.screen{display:none;flex:1;overflow:hidden;}.screen.active{display:flex;flex-direction:column;}

/* ═══════════════════════════════════
   SETUP SCREEN（メニュー画面）
   ═══════════════════════════════════ */
#ss{
  flex-direction:column;align-items:center;justify-content:space-evenly;
  background:linear-gradient(160deg,#050f2e 0%,#0d3270 40%,#1a6fb5 80%,#4a9fd4 100%);
  padding:max(env(safe-area-inset-top,0px)+24px, 28px) 24px max(env(safe-area-inset-bottom,0px)+24px, 28px);
  text-align:center;overflow-y:auto;gap:20px;
}
#ss.active{display:flex;}
/* ── タイトル・サブタイトル ── */
.gtitle{
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(52px,17vw,88px);
  font-weight:900;color:#FFE566;
  text-shadow:4px 4px 0 #5a2d00,0 0 40px rgba(255,229,102,.5);
  letter-spacing:4px;line-height:1.1;
}
.gsubt{color:rgba(255,255,255,.75);font-size:clamp(16px,4vw,20px);letter-spacing:3px;margin-top:-4px;}

.sbox{
  background:rgba(255,255,255,.08);
  border:1.5px solid rgba(255,255,255,.25);
  border-radius:24px;
  padding:clamp(22px,6vw,36px) clamp(20px,6vw,36px);
  width:100%;max-width:480px;
}
.sbox-title{
  color:#FFE566;font-size:clamp(16px,4.2vw,19px);
  letter-spacing:.5px;margin-bottom:20px;font-weight:700;
}
.btn-row{display:flex;gap:clamp(14px,4vw,24px);justify-content:center;}
/* CPU選択ボタン */
.sel-btn{
  width:clamp(72px,19vw,88px);height:clamp(72px,19vw,88px);
  border-radius:50%;
  border:2.5px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.45);
  font-size:clamp(26px,7.5vw,34px);font-weight:700;
  cursor:pointer;transition:all .15s;
  font-family:'Noto Sans JP',sans-serif;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;
}
.sel-btn:active{transform:scale(.92);}
.sel-btn.chosen{
  background:#FFE566!important;color:#0d2a6b!important;
  border-color:#FFE566!important;
  box-shadow:0 0 0 6px rgba(255,229,102,.25),0 6px 24px rgba(255,200,0,.5)!important;
  font-weight:900;
}
/* スタートボタン */
.start-btn{
  border:none;
  padding:clamp(18px,5vw,24px) 0;
  font-size:clamp(20px,5.2vw,24px);
  font-weight:700;border-radius:60px;
  cursor:not-allowed;
  font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;
  transition:all .25s;
  background:rgba(255,255,255,.1);color:rgba(255,255,255,.3);
  width:100%;max-width:360px;
  -webkit-tap-highlight-color:transparent;
}
.start-btn.ready{
  background:linear-gradient(135deg,#FFE566,#ffcb00)!important;
  color:#0d2a6b!important;
  box-shadow:0 8px 32px rgba(255,200,0,.55)!important;
  cursor:pointer;
}
.start-btn.ready:active{transform:scale(.97);}
.diff-btn{
  flex:1;
  padding:clamp(14px,4vw,18px) 0;
  border-radius:16px;
  border:2.5px solid rgba(255,255,255,.3);
  background:rgba(255,255,255,.08);
  color:rgba(255,255,255,.5);
  font-size:clamp(15px,4vw,18px);font-weight:700;
  cursor:pointer;transition:all .15s;
  font-family:'Noto Sans JP',sans-serif;
  -webkit-tap-highlight-color:transparent;
}
.diff-btn:active{transform:scale(.94);}
#diff-easy.chosen  {background:#27ae60!important;color:white!important;border-color:#27ae60!important;box-shadow:0 0 0 4px rgba(39,174,96,.3),0 4px 16px rgba(39,174,96,.4)!important;}
#diff-normal.chosen{background:#e67e22!important;color:white!important;border-color:#e67e22!important;box-shadow:0 0 0 4px rgba(230,126,34,.3),0 4px 16px rgba(230,126,34,.4)!important;}
#diff-hard.chosen  {background:#c0392b!important;color:white!important;border-color:#c0392b!important;box-shadow:0 0 0 4px rgba(192,57,43,.3),0 4px 16px rgba(192,57,43,.4)!important;}
.ss-note{color:rgba(255,255,255,.4);font-size:clamp(16px,3.5vw,17px);text-align:center;line-height:1.7;}

/* ═══════════════════════════════════
   GAME SCREEN 全体
   ═══════════════════════════════════ */
#gs.active{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}

/* ── 上段: マップ → 画面の48% ── */
.game-top{
  position:relative;
  height:48dvh;height:48vh;
  flex-shrink:0;
  background:linear-gradient(180deg,#87CEEB 0%,#b8e4f7 60%,#d4eef9 100%);
  border-bottom:2px solid #5aaad0;
  z-index:1;overflow:hidden;
}

/* 屋上エリア: 全幅 */
.roof-area{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:5px 8px 3px;
  overflow:hidden;
  position:relative;z-index:1;
}
.compass-label{
  text-align:center;font-size:26px;font-weight:700;
  color:#1a5a8a;line-height:1.3;
}
.compass-side{display:flex;align-items:center;gap:4px;}
.compass-lr{font-size:26px;font-weight:700;color:#1a5a8a;writing-mode:vertical-rl;}
#rgrid{display:grid;position:relative;gap:4px;}
.rcell{
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;transition:all .3s;
  background:linear-gradient(135deg,#c8dce8,#b0ccd8);
  border:2px solid #7aaabf;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 4px rgba(0,0,80,.1);
}
.rcell::after{content:'';position:absolute;inset:0;border-radius:6px;background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 60%);pointer-events:none;}
.rcell.safe{background:linear-gradient(135deg,#a8edbc,#6dcc88);border-color:#3da85a;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 0 0 2px rgba(61,168,90,.3),0 0 8px rgba(0,200,60,.2);}
.rcell.edge{background:linear-gradient(135deg,#c8dce8,#b0ccd8);border-color:#7aaabf;}
.rcell.has-pawn{border-color:#7aaabf;box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 4px rgba(0,0,80,.1);}
.rcell.has-pawn:not(.safe){background:linear-gradient(135deg,#c8dce8,#b0ccd8);}
.rcell.empty-cell{background:transparent;border:none;box-shadow:none;}
.rcell.empty-cell::after{display:none;}
.safe-text{font-size:15px;font-weight:800;color:#1a6b35;position:absolute;bottom:2px;left:0;right:0;text-align:center;}
.pawn-svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:5;}
.roof-legend{
  display:flex;gap:12px;margin-top:3px;font-size:13px;
  align-items:center;justify-content:center;
}
.leg-item{display:flex;align-items:center;gap:4px;color:#1a5a8a;font-weight:500;}
.leg-box{width:12px;height:12px;border-radius:3px;flex-shrink:0;}

/* ── サイドパネル: 右上にオーバーレイ ── */
.side-panel{
  position:absolute;top:6px;right:6px;
  width:154px;
  display:flex;flex-direction:column;gap:6px;
  z-index:20;
}
.dq-win{
  background:rgba(0,0,70,.90);
  border:2px solid;border-color:#9999ff #1a1aaa #1a1aaa #9999ff;
  border-radius:10px;padding:10px 12px;
  color:#fff;font-family:'Noto Sans JP',sans-serif;
  backdrop-filter:blur(6px);
  box-shadow:0 2px 14px rgba(0,0,0,.4);
}
.dq-win-title{font-size:14px;color:#FFE566;font-weight:700;letter-spacing:1px;border-bottom:1px solid rgba(255,229,102,.35);padding-bottom:3px;margin-bottom:6px;}
.dq-chara-icon{display:flex;justify-content:center;margin-bottom:4px;}
.dq-chara-name{font-size:16px;font-weight:700;color:#fff;text-align:center;line-height:1.3;}
.dq-chara-desc{font-size:13px;color:#aaddff;text-align:center;line-height:1.4;margin-top:2px;}
.dq-player-row{display:flex;align-items:center;gap:3px;padding:4px 0;font-size:14px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.08);}
.dq-player-row:last-child{border-bottom:none;}
.dq-player-row.dq-active{color:#FFE566;}
.dq-player-row.dq-normal{color:#bbb;}
.dq-player-arrow{font-size:13px;width:13px;}
.dq-player-cards{font-size:13px;color:#88aaff;margin-left:auto;}

/* ── 雲アニメーション ── */
.cloud-layer{
  position:absolute;inset:0;
  pointer-events:none;
  z-index:8;overflow:hidden;
}
.cloud{
  position:absolute;
  opacity:0.78;
  will-change:transform;
  transform:translateX(calc(100vw + 160px)); /* 初期状態は画面外 */
}


@keyframes cloudRTL{
  0%  {transform:translateX(calc(100vw + 160px));}
  100%{transform:translateX(-160px);}
}
@keyframes cloudLTR{
  0%  {transform:translateX(-160px);}
  100%{transform:translateX(calc(100vw + 160px));}
}


/* ── 吹き出し（トゲトゲ） ── */
.pawn-bubble{
  position:absolute;
  pointer-events:none;
  z-index:6;
  animation:bubblePop .25s cubic-bezier(.34,1.56,.64,1);
}
.pawn-bubble svg{overflow:visible;display:block;}
.pawn-bubble text{
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;font-weight:700;fill:#c0392b;
  dominant-baseline:middle;text-anchor:middle;
}
@keyframes bubblePop{
  0%{transform:scale(.5);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.game-body{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:8px 10px max(env(safe-area-inset-bottom,0px)+48px, 56px);
  -webkit-overflow-scrolling:touch;
  min-height:0;position:relative;
  background:#eef4fa;
}

/* ── カードラベル ── */
.cards-section-label{
  font-size:32px;color:#0d4a82;font-weight:700;
  margin-bottom:9px;letter-spacing:.5px;
}

/* ── 2列グリッド ── */
.cards-col{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* ── トランプカード ── */
.vcard{
  background:#fff;
  border:3px solid #4a9fd4;
  border-radius:14px;
  cursor:pointer;transition:all .18s;
  overflow:hidden;position:relative;
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
  width:100%;
  aspect-ratio:5/7;
  box-shadow:0 4px 12px rgba(0,0,0,.18),2px 2px 0 rgba(0,0,0,.08);
}
.vcard:active:not(.used){transform:scale(.95) translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.25);}
.vcard.sel{border-color:#e8b84b;box-shadow:0 0 0 3px rgba(232,184,75,.55),0 6px 20px rgba(232,184,75,.3);transform:translateY(-4px);}
.vcard.used{opacity:.22;cursor:not-allowed;filter:grayscale(1);transform:none;}
.sel-badge{position:absolute;top:4px;right:4px;background:#e8b84b;color:#5a3000;font-size:11px;font-weight:700;border-radius:4px;padding:2px 7px;z-index:3;}

.card-serif-center{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  padding:4px 6px;
  font-size:clamp(24px,6vw,30px);font-weight:900;
  color:#c0392b;line-height:1.3;
  text-align:center;word-break:break-all;
  border-bottom:1.5px solid rgba(0,0,0,.1);
  background:rgba(255,255,255,.85);
}
.card-compass{
  flex:3;display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:2px;padding:4px;
  background:#f0f4ff;
}
.cc{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;padding:3px 1px;}
.cc.cN{background:#dbeafe;grid-column:2;grid-row:1;}
.cc.cW{background:#fce7f3;grid-column:1;grid-row:2;}
.cc.cE{background:#fef3c7;grid-column:3;grid-row:2;}
.cc.cS{background:#d1fae5;grid-column:2;grid-row:3;}
.cc.ce{background:transparent;}
.cc-dir{font-size:clamp(32px,8vw,36px);font-weight:900;line-height:1;margin-bottom:3px;}
.cN .cc-dir{color:#1e40af;}.cE .cc-dir{color:#92400e;}.cS .cc-dir{color:#065f46;}.cW .cc-dir{color:#831843;}
.cc-nums{font-size:clamp(13px,3.5vw,16px);font-weight:700;line-height:1.2;text-align:center;color:#333;}
.cc-fudo-dir{font-size:clamp(32px,8vw,36px);font-weight:900;line-height:1;color:#888;}
.cc-fudo-num{font-size:clamp(13px,3.5vw,16px);font-weight:700;color:#888;text-align:center;}
.pvcc-nums{font-size:11px;font-weight:700;color:#333;line-height:1.2;text-align:center;}

/* サイコロアニメ */
@keyframes droll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(15deg) scale(1.1)}50%{transform:rotate(-10deg) scale(.95)}75%{transform:rotate(8deg) scale(1.05)}100%{transform:rotate(0) scale(1)}}
.dice-anim{animation:droll .5s ease;}

/* ── 4択サイコロポップアップ ── */
.roll-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.roll-choice-btn{
  border:2.5px solid transparent;border-radius:16px;
  padding:clamp(16px,4.5vw,22px) 8px;
  font-family:'Noto Sans JP',sans-serif;
  font-size:clamp(14px,3.8vw,16px);font-weight:700;
  cursor:pointer;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  -webkit-tap-highlight-color:transparent;
  min-height:100px;justify-content:center;
}
.roll-choice-btn:active{transform:scale(.93);}
.rc-normal{background:#e8f0fe;border-color:#4a7fd4;color:#1a3a82;}
.rc-strong{background:#fff0e0;border-color:#e07820;color:#7a3a00;}
.rc-weak{background:#e8f8ee;border-color:#3da85a;color:#1a5a2a;}
.rc-cancel{background:#f5f5f5;border-color:#bbb;color:#666;}
.rc-label{font-size:clamp(16px,4vw,18px);font-weight:700;}
.rc-desc{font-size:clamp(13px,3.2vw,14px);font-weight:400;opacity:.8;line-height:1.4;text-align:center;}
.rc-dice-preview{font-size:clamp(26px,7vw,32px);line-height:1;}

/* LOG */
.glog{font-size:14px;color:#333;line-height:1.6;max-height:52px;overflow-y:auto;}
.log-e{padding:1px 0;border-bottom:1px solid rgba(0,0,0,.05);}
.log-e.last{font-weight:700;color:#0d4a82;}

/* ═══════════════════════════════════
   RESULT SCREEN
   ═══════════════════════════════════ */
#rs{
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  padding:max(env(safe-area-inset-top,0px)+28px,32px) 24px max(env(safe-area-inset-bottom,0px)+28px,32px);
  overflow-y:auto;gap:16px;
}
#rs.active{display:flex;}
.r-win{background:linear-gradient(180deg,#0d6b2e,#27ae60);}
.r-lose{background:linear-gradient(180deg,#4a0a0a,#c0392b);}
.rtitle{
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(48px,13vw,64px);font-weight:900;
  text-shadow:3px 3px 0 rgba(0,0,0,.3);
  animation:rpop .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes rpop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.rsub{font-size:clamp(16px,4vw,18px);color:rgba(255,255,255,.92);line-height:1.85;}
.rdetail{
  background:rgba(255,255,255,.15);border-radius:18px;
  padding:16px 22px;
  font-size:clamp(15px,3.8vw,17px);color:rgba(255,255,255,.92);line-height:2.1;
  width:100%;max-width:400px;
}
/* リトライボタン */
.retry-btn{
  background:white;border:none;
  padding:clamp(17px,4.8vw,21px) clamp(48px,14vw,72px);
  font-size:clamp(20px,5vw,22px);font-weight:700;
  border-radius:60px;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;letter-spacing:2px;
  transition:all .2s;box-shadow:0 6px 20px rgba(0,0,0,.35);
  -webkit-tap-highlight-color:transparent;
}
.retry-btn:active{transform:scale(.96);}
.result-chara{animation:rpop .6s cubic-bezier(.34,1.56,.64,1) .1s both;}

/* ═══════════════════════════════════
   POPUP（ボトムシート）
   ═══════════════════════════════════ */
.popup-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.52);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:999;pointer-events:none;
}
.popup-box{
  background:white;
  border-radius:28px 28px 0 0;
  padding:28px 24px max(env(safe-area-inset-bottom,0px)+28px,36px);
  max-width:560px;width:100%;
  min-height:62dvh;min-height:62vh;
  box-shadow:0 -8px 48px rgba(0,0,0,.38);
  text-align:center;
  animation:slideUp .3s cubic-bezier(.34,1.2,.64,1);
  pointer-events:auto;
  display:flex;flex-direction:column;justify-content:center;
  overflow-y:auto;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
/* ポップアップ引き手 */
.popup-box::before{
  content:'';
  display:block;
  width:40px;height:4px;
  background:rgba(0,0,0,.15);
  border-radius:2px;
  margin:0 auto 20px;
  flex-shrink:0;
}
.popup-icon{font-size:clamp(52px,13vw,68px);margin-bottom:10px;line-height:1;}
.popup-title{font-size:clamp(20px,5vw,24px);font-weight:700;color:#0d4a82;margin-bottom:12px;line-height:1.5;}
.popup-body{font-size:clamp(16px,4vw,18px);color:#333;line-height:1.9;margin-bottom:20px;}
.popup-body b{color:#c0392b;}
.popup-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
/* ポップアップボタン */
.popup-btn{
  padding:clamp(16px,4.5vw,20px) clamp(32px,9vw,48px);
  border:none;border-radius:60px;
  font-size:clamp(19px,4.8vw,22px);font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  transition:all .18s;
  -webkit-tap-highlight-color:transparent;
  min-width:120px;
}
.popup-btn:active{transform:scale(.95);}
.popup-btn.yes{background:#0d4a82;color:white;}
.popup-btn.no{background:#f0f0f0;color:#555;}
.popup-btn.only{background:#0d4a82;color:white;padding:clamp(16px,4.5vw,20px) clamp(48px,14vw,72px);}

/* ── ポップアップ内カード（小） ── */
.popup-vcard{display:inline-flex;flex-direction:column;border:2px solid #e8b84b;border-radius:10px;overflow:hidden;margin:4px auto 12px;width:136px;text-align:left;background:#fff;}
.pvc-header{display:flex;align-items:center;gap:5px;padding:7px 9px 6px;border-bottom:1px solid rgba(232,184,75,.3);}
.pvc-emoji{font-size:24px;flex-shrink:0;}
.pvc-serif{font-size:12px;font-weight:700;color:#c0392b;line-height:1.3;flex:1;}
.pvc-compass{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:2px;padding:5px;background:#f0f4ff;}
.pvcc{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:32px;border-radius:4px;padding:2px 1px;}
.pvcc.pvN{background:#dbeafe;grid-column:2;grid-row:1;}
.pvcc.pvW{background:#fce7f3;grid-column:1;grid-row:2;}
.pvcc.pvE{background:#fef3c7;grid-column:3;grid-row:2;}
.pvcc.pvS{background:#d1fae5;grid-column:2;grid-row:3;}
.pvcc.pve{background:transparent;}
.pvcc-dir{font-size:13px;font-weight:900;line-height:1;margin-bottom:2px;}
.pvN .pvcc-dir{color:#1e40af;}.pvE .pvcc-dir{color:#92400e;}.pvS .pvcc-dir{color:#065f46;}.pvW .pvcc-dir{color:#831843;}
.pvcc-dice{display:flex;gap:1px;flex-wrap:wrap;justify-content:center;}
.pp-sm{width:11px;height:11px;flex-shrink:0;}

/* ===== サイコロSVG ===== */
function makeDiceSvg(face,size){
  const pips=[[],[{x:5,y:5}],[{x:2.5,y:2.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:5,y:5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}],[{x:2.5,y:2.5},{x:7.5,y:2.5},{x:2.5,y:5},{x:7.5,y:5},{x:2.5,y:7.5},{x:7.5,y:7.5}]];
  const ps=pips[face].map(p=>`<circle cx="${p.x}" cy="${p.y}" r="1.1" fill="#1a1a2e"/>`).join('');
  return `<svg viewBox="0 0 10 10" width="${size}" height="${size}"><rect width="10" height="10" rx="1.5" fill="white" stroke="#bbb" stroke-width=".5"/>${ps}</svg>`;
}

/* ===== トランプ型カードHTML（ゲーム画面用） ===== */
function makeVCard(card, idx){
  const isSelected=G.selCard===idx, isUsed=card.used;
  const byDir={N:[],E:[],S:[],W:[],X:[]};
  for(let d=2;d<=12;d++) if(card.dirs[d]) byDir[card.dirs[d]].push(d);

  function ccCell(dir,col,row){
    const nums=byDir[dir];
    const label={N:'北',E:'東',S:'南',W:'西'}[dir];
    if(!nums.length) return `<div class="cc ce" style="grid-column:${col};grid-row:${row};"></div>`;
    const numStr=nums.join('・');
    return `<div class="cc c${dir}" style="grid-column:${col};grid-row:${row};">
      <div class="cc-dir">${label}</div>
      <div class="cc-nums">${numStr}</div>
    </div>`;
  }
  // 不動の数字
  const fudoNums=byDir['X'];
  const fudoStr=fudoNums.length?`<div class="cc-fudo-dir">不動</div><div class="cc-fudo-num">${fudoNums.join('・')}</div>`:'';

  const el=document.createElement('div');
  el.className='vcard'+(isUsed?' used':'')+(isSelected?' sel':'');
  el.style.background=card.bg||'#fff';
  el.innerHTML=`${isSelected?'<div class="sel-badge">選択中</div>':''}
    <div class="card-serif-center">「${card.serif}」</div>
    <div class="card-compass">
      <div class="cc ce" style="grid-column:1;grid-row:1;"></div>${ccCell('N',2,1)}<div class="cc ce" style="grid-column:3;grid-row:1;"></div>
      ${ccCell('W',1,2)}<div class="cc ce" style="grid-column:2;grid-row:2;display:flex;flex-direction:column;align-items:center;justify-content:center;">${fudoStr}</div>${ccCell('E',3,2)}
      <div class="cc ce" style="grid-column:1;grid-row:3;"></div>${ccCell('S',2,3)}<div class="cc ce" style="grid-column:3;grid-row:3;"></div>
    </div>`;
  if(!isUsed&&(G.phase==='select'||G.phase==='roll')) el.onclick=()=>selectCard(idx);
  return el;
}

/* ===== POPUP ===== */
function showPopup(icon,title,body,btns){
  document.getElementById('popup-icon').innerHTML=icon;
  document.getElementById('popup-title').innerHTML=title;
  document.getElementById('popup-body').innerHTML=body;
  const bc=document.getElementById('popup-btns');bc.innerHTML='';
  btns.forEach(b=>{const el=document.createElement('button');el.className='popup-btn '+b.cls;el.textContent=b.label;el.onclick=()=>{hidePopup();b.action();};bc.appendChild(el);});
  document.getElementById('popup').style.display='flex';
}
function hidePopup(){document.getElementById('popup').style.display='none';}

    return ctx;
  }
  function osc(freq, type, start, dur, vol, ac) {
    const g = ac.createGain();
    g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    const o = ac.createOscillator();
    o.type = type; o.frequency.setValueAtTime(freq, ac.currentTime + start);
    o.connect(g); o.start(ac.currentTime + start); o.stop(ac.currentTime + start + dur);
  }
  function sweep(f0, f1, type, start, dur, vol, ac) {
    const g = ac.createGain();
    g.connect(ac.destination);
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    const o = ac.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(f0, ac.currentTime + start);
    o.frequency.linearRampToValueAtTime(f1, ac.currentTime + start + dur);
    o.connect(g); o.start(ac.currentTime + start); o.stop(ac.currentTime + start + dur);
  }
  function noise(start, dur, vol, ac) {
    const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource(); src.buffer = buf;
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, ac.currentTime + start);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + start + dur);
    src.connect(g); g.connect(ac.destination);
    src.start(ac.currentTime + start); src.stop(ac.currentTime + start + dur);
  }
  return {
    cardSelect()  { const ac=getCtx(); osc(600,'sine',0,.06,.18,ac); osc(900,'sine',.04,.06,.1,ac); },
    diceRattle()  { const ac=getCtx(); noise(0,.05,.25,ac); noise(.07,.05,.2,ac); noise(.14,.04,.15,ac); },
    diceResult()  { const ac=getCtx(); noise(0,.08,.35,ac); osc(120,'sine',0,.25,.5,ac); osc(60,'sine',.06,.3,.3,ac); },
    charaMove()   { const ac=getCtx(); sweep(300,80,'sine',0,.35,.4,ac); noise(0,.1,.15,ac); },
    gameStart()   { const ac=getCtx(); [0,.18,.36].forEach((t,i)=>osc([440,440,660][i],'square',t,.14,.12,ac)); },
    turnStart()   { const ac=getCtx(); osc(880,'sine',0,.08,.15,ac); osc(660,'sine',.09,.08,.1,ac); },
    win() {
      // ギャラリーの大歓声：ノイズ+歓声っぽい複数音の重なり
      const ac = getCtx();
      // どよめき感：帯域ノイズを複数重ねてフェードイン→サステイン
      [0, 0.05, 0.1, 0.18, 0.28].forEach((t, i) => {
        const vol = [0.18, 0.22, 0.28, 0.32, 0.35][i];
        const dur = [1.2, 1.1, 1.0, 0.9, 1.3][i];
        const buf = ac.createBuffer(1, Math.ceil(ac.sampleRate * dur), ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
        const src = ac.createBufferSource(); src.buffer = buf;
        // バンドパスフィルタで「声」帯域に絞る
        const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
        bp.frequency.value = [800,1200,600,1000,900][i]; bp.Q.value = 0.6;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.001, ac.currentTime + t);
        g.gain.linearRampToValueAtTime(vol, ac.currentTime + t + 0.15);
        g.gain.setValueAtTime(vol, ac.currentTime + t + dur - 0.3);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + dur);
        src.connect(bp); bp.connect(g); g.connect(ac.destination);
        src.start(ac.currentTime + t); src.stop(ac.currentTime + t + dur);
      });
      // 歓声のピークで高揚感ある口笛・歓声トーン
      [[1200,0.2],[1500,0.35],[900,0.5],[1800,0.6]].forEach(([f,t]) => {
        const g = ac.createGain();
        g.gain.setValueAtTime(0.08, ac.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.4);
        const o = ac.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(f, ac.currentTime + t);
        o.frequency.linearRampToValueAtTime(f * 1.15, ac.currentTime + t + 0.2);
        o.connect(g); g.connect(ac.destination);
        o.start(ac.currentTime + t); o.stop(ac.currentTime + t + 0.4);
      });
    },
    lose() {
      // パトカーのサイレンが遠ざかる音
      const ac = getCtx();
      const totalDur = 3.0;
      // ウーウー繰り返しサイレン（ピッチと音量が徐々に下がる）
      for (let i = 0; i < 6; i++) {
        const t = i * 0.48;
        const distanceFade = Math.pow(0.55, i); // 遠ざかるにつれ減衰
        const pitchFade = 1 - i * 0.05;         // ドップラー効果で音が低くなる
        // 高音
        const g1 = ac.createGain();
        g1.gain.setValueAtTime(0.28 * distanceFade, ac.currentTime + t);
        g1.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.22);
        const o1 = ac.createOscillator(); o1.type = 'sawtooth';
        o1.frequency.setValueAtTime(880 * pitchFade, ac.currentTime + t);
        o1.frequency.linearRampToValueAtTime(660 * pitchFade, ac.currentTime + t + 0.22);
        o1.connect(g1); g1.connect(ac.destination);
        o1.start(ac.currentTime + t); o1.stop(ac.currentTime + t + 0.22);
        // 低音（位相ずらし）
        const g2 = ac.createGain();
        g2.gain.setValueAtTime(0.22 * distanceFade, ac.currentTime + t + 0.22);
        g2.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + t + 0.44);
        const o2 = ac.createOscillator(); o2.type = 'sawtooth';
        o2.frequency.setValueAtTime(660 * pitchFade, ac.currentTime + t + 0.22);
        o2.frequency.linearRampToValueAtTime(880 * pitchFade, ac.currentTime + t + 0.44);
        o2.connect(g2); g2.connect(ac.destination);
        o2.start(ac.currentTime + t + 0.22); o2.stop(ac.currentTime + t + 0.44);
      }
    },
    confirm()     { const ac=getCtx(); osc(440,'sine',0,.07,.12,ac); },
    // 女性の悲鳴：高音域の鋭いグリッサンド＋振動
    screamFemale() {
      const ac=getCtx();
      // 鋭い高音の立ち上がり
      sweep(900,1800,'sine',0,.18,.28,ac);
      sweep(800,1600,'sine',.02,.2,.2,ac);
      // 悲鳴の震え（ビブラート風）
      [.18,.24,.30,.36,.42].forEach((t,i)=>{
        const vol=.22-i*.04;
        sweep(1600-i*60,1400-i*60,'sine',t,.1,vol,ac);
      });
      // フェードアウト
      sweep(1300,600,'sine',.45,.35,.12,ac);
    },
    // 男性の悲鳴：低めの荒々しい叫び
    screamMale() {
      const ac=getCtx();
      // 低音域の荒い叫び
      sweep(300,600,'sawtooth',0,.15,.3,ac);
      sweep(250,500,'sawtooth',.02,.18,.22,ac);
      // 叫びの粗さ（ノイズ混じり）
      noise(0,.2,.2,ac);
      // 震え
      [.15,.22,.29,.36].forEach((t,i)=>{
        const vol=.25-i*.05;
        sweep(520-i*30,420-i*30,'sawtooth',t,.12,vol,ac);
      });
      // フェードアウト
      sweep(400,150,'sawtooth',.4,.4,.12,ac);
    },
  };
})();

function cpuPickCard(){
  const p=G.players[G.cur];
  const avail=p.cards.map((c,i)=>({c,i})).filter(({c})=>!c.used);
  if(!avail.length) return -1;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1],X:[0,0]};
  function dist(r1,c1,r2,c2){return Math.abs(r1-r2)+Math.abs(c1-c2);}
  const bd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(G.pawn.r,G.pawn.c,s.r,s.c)),999);
  // 出目2〜12の確率重み（2個サイコロの正規分布）
  const prob={2:1,3:2,4:3,5:4,6:5,7:6,8:5,9:4,10:3,11:2,12:1}; // 合計36
  let best=null,bs=-999;
  avail.forEach(({c:card,i})=>{
    let score=0;
    for(let d=2;d<=12;d++){
      const dir=card.dirs[d];
      const w=prob[d];
      if(dir==='X'){score+=0;continue;} // 不動はスコアなし
      const [dr,dc]=dm[dir];
      const nr=G.pawn.r+dr,nc=G.pawn.c+dc;
      if(!onBoard(nr,nc)){score-=3*w;}
      else if(isSafe(nr,nc)){score+=6*w;}
      else{
        const nd=G.rooftop.safe.reduce((mn,s)=>Math.min(mn,dist(nr,nc,s.r,s.c)),999);
        score+=(nd<bd?2:nd>bd?-2:0)*w;
      }
    }
    if(score>bs){bs=score;best=i;}
  });
  return best!==null?best:avail[0].i;
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function getCells(){const r=G.rooftop;if(r.cells)return r.cells;const c=[];for(let row=0;row<r.rows;row++)for(let col=0;col<r.cols;col++)c.push([row,col]);return c;}
function isSafe(r,c){return G.rooftop.safe.some(s=>s.r===r&&s.c===c);}
function onBoard(r,c){return getCells().some(([cr,cc])=>cr===r&&cc===c);}
function isEdge(r,c){const cells=getCells();if(!cells.some(([cr,cc])=>cr===r&&cc===c))return false;return[[0,1],[0,-1],[1,0],[-1,0]].some(([dr,dc])=>!cells.some(([cr,cc])=>cr===r+dr&&cc===c+dc));}

function renderBoard(){
  const grid=document.getElementById('rgrid');
  const cells=getCells();let mr=0,mc=0;cells.forEach(([r,c])=>{mr=Math.max(mr,r);mc=Math.max(mc,c);});
  const rows=mr+1,cols=mc+1;
  const gap=4;
  // サイドパネルはオーバーレイのため全幅使用 (コンパスラベル32px×2 + パディング20px を除く)
  const availW=window.innerWidth-32-32-20;
  // 利用可能高さ: 上半分(48vh) - 北南ラベル(28px) - パディング(12px) ※legend削除済み
  const availH=window.innerHeight*0.48-28-12;
  const cellByW=Math.floor((availW-(cols-1)*gap)/cols);
  const cellByH=Math.floor((availH-(rows-1)*gap)/rows);
  const cellSize=Math.max(36,Math.min(cellByW,cellByH,80));
  grid.style.cssText=`display:grid;grid-template-columns:repeat(${cols},${cellSize}px);grid-template-rows:repeat(${rows},${cellSize}px);width:${cols*cellSize+(cols-1)*gap}px;height:${rows*cellSize+(rows-1)*gap}px;gap:${gap}px;`;
  grid.innerHTML='';
  const cmap={};cells.forEach(([r,c])=>{cmap[`${r},${c}`]=true;});
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const el=document.createElement('div');
    if(!cmap[`${r},${c}`]){el.className='rcell empty-cell';grid.appendChild(el);continue;}
    const safe=isSafe(r,c),edge=isEdge(r,c),hasPawn=G.pawn&&G.pawn.r===r&&G.pawn.c===c;
    el.className='rcell'+(safe?' safe':edge?' edge':'')+(hasPawn?' has-pawn':'');
    if(hasPawn){
      el.innerHTML=`<svg class="pawn-svg" width="40" height="46" viewBox="0 0 38 44">${G.chara.svg.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1]}</svg>`
        +(safe?'<div class="safe-text" style="position:absolute;bottom:2px;left:0;right:0;text-align:center;z-index:3;">安全圏</div>':'');
    }
    else if(safe){el.innerHTML='<div class="safe-text">安全圏</div>';}
    grid.appendChild(el);
  }}
}

/* ===== 重み付きサイコロ ===== */
// 普通: 均等 [1,1,1,1,1,1]
// 強く: 大きい目寄り [1,1,2,2,3,3] → 4,5,6が出やすい
// 弱く: 小さい目寄り [3,3,2,2,1,1] → 1,2,3が出やすい
// サイコロ2個を振って合計(2-12)を返す。正規分布的な重み付き
function rollOneDie(mode){
  const w={normal:[1,1,1,1,1,1],strong:[1,1,2,3,4,5],weak:[5,4,3,2,1,1]}[mode]||[1,1,1,1,1,1];
  const total=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<6;i++){r-=w[i];if(r<=0)return i+1;}
  return 6;
}
function weightedRoll(mode){
  return rollOneDie(mode)+rollOneDie(mode);
}

function doRollDice(mode='normal'){
  // ポップアップ内にアニメ用サイコロ絵文字表示
  const modeLabel={normal:'普通に振る',strong:'強く振る',weak:'弱く振る'}[mode]||'振る';
  const modeTip={normal:'出目は均等です',strong:'大きい目が出やすい！',weak:'小さい目が出やすい！'}[mode]||'';

  // サイコロアニメ用の一時ポップアップ
  document.getElementById('popup-icon').innerHTML='🎲🎲';
  document.getElementById('popup-title').innerHTML=modeLabel+'!';
  document.getElementById('popup-body').innerHTML=`<div id="roll-anim" style="font-size:48px;line-height:1;margin:8px 0;letter-spacing:8px;">⚀⚀</div><div style="font-size:16px;color:#888;">${modeTip}</div>`;
  document.getElementById('popup-btns').innerHTML='';
  document.getElementById('popup').style.display='flex';

  const animEl=document.getElementById('roll-anim');
  let cnt=0;
  const iv=setInterval(()=>{
    SFX.diceRattle();
    const f1=DFACES[Math.floor(Math.random()*6)];
    const f2=DFACES[Math.floor(Math.random()*6)];
    animEl.textContent=f1+f2;
    animEl.classList.toggle('dice-anim');
    if(++cnt>10){
      clearInterval(iv);
      const r=weightedRoll(mode);
      // 2個のサイコロの組み合わせを逆算して表示（合計がrになるランダムな組み合わせ）
      const d1=Math.max(1,Math.min(6,Math.floor(Math.random()*(Math.min(r-1,6)-Math.max(1,r-6)+1))+Math.max(1,r-6)));
      const d2=r-d1;
      animEl.textContent=DFACES[d1-1]+DFACES[d2-1];
      SFX.diceResult();
      setTimeout(()=>{hidePopup();processRoll(r,mode);},600);
    }
  },60);
}

/* 安全圏までのマンハッタン距離（最小） */
function distToSafe(r,c){
  return Math.min(...G.rooftop.safe.map(s=>Math.abs(s.r-r)+Math.abs(s.c-c)));
}
function processRoll(result,mode){
  const modeStr={normal:'',strong:'【強振り】',weak:'【弱振り】'}[mode]||'';
  const p=G.players[G.cur],card=p.cards[G.selCard],dir=card.dirs[result];
  p.cards[G.selCard].used=true;
  const dm={N:[-1,0],S:[1,0],E:[0,1],W:[0,-1],X:[0,0]};const [dr,dc]=dm[dir];const nr=G.pawn.r+dr,nc=G.pawn.c+dc;
  addLog(`${modeStr}出目:${result} → ${DL[dir]}`);

  const prevDist=distToSafe(G.pawn.r,G.pawn.c);
  const nextDist=distToSafe(nr,nc);
  const approaching=dir!=='X'&&nextDist<prevDist;
  const charaLine=getCharaLine(G.chara,approaching);

  // 出目表示: 2個のサイコロ顔に分解
  const d1=Math.max(1,Math.min(6,Math.floor(Math.random()*(Math.min(result-1,6)-Math.max(1,result-6)+1))+Math.max(1,result-6)));
  const d2=result-d1;
  const diceDisp=DFACES[d1-1]+DFACES[d2-1];

  // 第1ポップアップ: 出目 + 選んだカード
  showPopup(diceDisp,`合計 ${result}！ → ${DL[dir]}`,
    makePopupVCard(card),
    [{label:'続ける',cls:'only',action:()=>{
      SFX.confirm();
      if(dir==='X'){
        // 不動: 移動なし
        showPopup('🙅',`合計${result}…${G.chara.name}は動きませんでした`,
          `<span style="color:#555;font-size:16px;">不動：その場にとどまります</span>`,
          [{label:'続ける',cls:'only',action:()=>{
            SFX.confirm();
            G.turns++;
            if(G.players.every(pl=>pl.cards.every(c=>c.used))){redistributeCards();return;}
            nextTurn();
          }}]);
        return;
      }
      G.pawn={r:nr,c:nc};renderBoard();SFX.charaMove();
      const lineColor=approaching?'#065f46':'#b91c1c';
      const lineIcon=approaching?'💬':'😠';
      // 第2ポップアップ: キャラセリフ + 移動方向
      showPopup(lineIcon,
        `${G.chara.name}「${charaLine}」`,
        `<span style="color:${lineColor};font-size:16px;">${G.chara.name}</span>が<b>「${DL[dir]}」</b>へ動きました。`,
        [{label:'続ける',cls:'only',action:()=>{
          SFX.confirm();
          if(onBoard(nr,nc)&&isSafe(nr,nc)){showResult(true,result,dir,card);return;}
          if(!onBoard(nr,nc)){
            G.chara.gender==='female' ? SFX.screamFemale() : SFX.screamMale();
            showPopup('💥',
              `${G.chara.name}は屋上から転落してしまいました…`,
              '',
              [{label:'続ける',cls:'only',action:()=>{
                SFX.confirm();showResult(false,result,dir,card);
              }}]);
            return;
          }
          G.turns++;
          if(G.players.every(pl=>pl.cards.every(c=>c.used))){
            redistributeCards();
            return;
          }
          nextTurn();
        }}]);
    }}]);
}

function redistributeCards(){
  // 全プレイヤーに同じ6枚を配り直し
  G.players.forEach(p=>{
    p.cards=CARDS.map(c=>({...c,used:false}));
  });
  G.cur=0;G.phase='select';G.selCard=null;
  renderGame();
  showPopup('🃏','呼びかけカードを配り直します！',
    `全員のカードがなくなりました。<br>新たなカードで続けましょう！`,
    [{label:'続ける',cls:'only',action:()=>{
      SFX.confirm();popupTurnStart(0);
    }}]);
}

function nextTurn(){
  let next=(G.cur+1)%G.players.length,t=0;
  while(G.players[next].cards.every(c=>c.used)&&t<G.players.length){next=(next+1)%G.players.length;t++;}
  G.cur=next;G.phase='select';G.selCard=null;
  renderGame();addLog(`--- ${G.players[next].name}のターン ---`);popupTurnStart(next);
}

/* ===== 吹き出しアニメーション ===== */
let bubbleTimer = null;

function startBubble(){
  stopBubble();
  // 表示→3秒後に消す→2秒後に再表示、を繰り返す
  function cycle(){
    showBubble();
    bubbleTimer = setTimeout(()=>{
      const b = document.getElementById('pawn-bubble');
      if(b) b.remove();
      bubbleTimer = setTimeout(cycle, 3000);
    }, 2000);
  }
  cycle();
}

function stopBubble(){
  if(bubbleTimer){ clearTimeout(bubbleTimer); bubbleTimer=null; }
  const b = document.getElementById('pawn-bubble');
  if(b) b.remove();
}

function showBubble(){
  const old = document.getElementById('pawn-bubble');
  if(old) old.remove();

  const pawnCell = document.querySelector('.rcell.has-pawn');
  if(!pawnCell) return;

  const text = G.chara && G.chara.gender === 'female' ? '来ないで！' : '来るな！';

  // 吹き出しSVGサイズ
  const bw = 96, bh = 52, spikes = 8, tailW = 14;

  // トゲトゲのパスを生成
  function spikePath(w, h, n){
    const cx = w/2, cy = h/2;
    const rx = w/2, ry = h/2;
    const pts = [];
    for(let i=0;i<n*2;i++){
      const angle = (i / (n*2)) * Math.PI * 2 - Math.PI/2;
      const r = (i%2===0) ? 1.0 : 0.72; // 外側・内側交互
      pts.push([cx + rx*r*Math.cos(angle), cy + ry*r*Math.sin(angle)]);
    }
    return 'M'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join('L')+'Z';
  }

  // しっぽ（左向き三角）
  const tailPath = `M0,${bh/2} L${tailW},${bh/2-6} L${tailW},${bh/2+6}Z`;

  const svg = `<svg width="${bw+tailW}" height="${bh}" viewBox="-${tailW} 0 ${bw+tailW} ${bh}" xmlns="http://www.w3.org/2000/svg">
    <path d="${tailPath}" fill="white" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="${spikePath(bw,bh,spikes)}" fill="white" stroke="#333" stroke-width="1.8"/>
    <text x="${bw/2}" y="${bh/2}">${text}</text>
  </svg>`;

  const bubble = document.createElement('div');
  bubble.id = 'pawn-bubble';
  bubble.className = 'pawn-bubble';
  bubble.innerHTML = svg;

  const cellRect = pawnCell.getBoundingClientRect();
  const topRect  = document.querySelector('.game-top').getBoundingClientRect();

  // 駒セルの右端 + 少し余白
  const left = cellRect.right  - topRect.left + 4;
  const top  = cellRect.top    - topRect.top  + cellRect.height/2 - bh/2;

  bubble.style.left = left + 'px';
  bubble.style.top  = top  + 'px';

  document.querySelector('.game-top').appendChild(bubble);
}


(function initClouds(){
  // 雲をCanvasに描画する関数
  function drawCloud(canvas, w, h){
    canvas.width  = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    // 白塗り＋薄いシャドウ
    ctx.fillStyle   = 'white';
    ctx.shadowColor = 'rgba(200,230,255,0.5)';
    ctx.shadowBlur  = 8;

    const cx = w * 0.5;
    const cy = h * 0.62;
    const r  = h * 0.28;

    ctx.beginPath();
    // 底辺の長方形（雲の台）
    ctx.roundRect(w*0.1, cy - r*0.3, w*0.8, r*1.1, r*0.3);
    ctx.fill();

    // 丸い膨らみを重ねる
    const bumps = [
      { x: cx - w*0.22, y: cy - r*0.5,  r: r*0.7  },
      { x: cx,          y: cy - r*1.0,  r: r*0.95 },
      { x: cx + w*0.20, y: cy - r*0.55, r: r*0.75 },
      { x: cx - w*0.10, y: cy - r*0.75, r: r*0.6  },
    ];
    bumps.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      ctx.fill();
    });
  }

  // 設定: [垂直位置%, サイズ倍率, 速度ms, 初期遅延ms]
  const configs = [
    { top:12, scale:1.0,  speed:18000, delay:0     },
    { top:42, scale:0.72, speed:24000, delay:7000  },
    { top:65, scale:1.25, speed:20000, delay:13000 },
  ];

  const clouds = document.querySelectorAll('.cloud');
  const dirs   = [true, true, true]; // true=右→左

  function animateCloud(el, cfg, dir, isFirst){
    const baseW = Math.round(window.innerWidth * 0.28 * cfg.scale);
    const w = Math.max(80, Math.min(baseW, 160));
    const h = Math.round(w * 0.55);

    drawCloud(el, w, h);
    el.style.top = cfg.top + '%';

    const duration = cfg.speed + Math.random()*4000;
    const delay    = isFirst ? cfg.delay : 0;

    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = `${dir?'cloudRTL':'cloudLTR'} ${duration}ms ${delay}ms linear 1 forwards`;

    el.addEventListener('animationend', function handler(){
      el.removeEventListener('animationend', handler);
      const idx = Array.from(clouds).indexOf(el);
      dirs[idx] = !dirs[idx];
      animateCloud(el, cfg, dirs[idx], false);
    }, {once:true});
  }

  configs.forEach((cfg, i) => animateCloud(clouds[i], cfg, dirs[i], true));
})();
